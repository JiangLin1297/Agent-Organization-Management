<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .screen {
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1, h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 2.5em;
        }
        h2 {
            font-size: 2em;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
            outline: none;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #score-display {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e94560;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        }
        #game-canvas {
            border: 3px solid #e94560;
            border-radius: 10px;
            background-color: #16213e;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.2);
            max-width: 100%;
            height: auto;
        }
        .final-score {
            font-size: 2em;
            font-weight: 700;
            color: #e94560;
            margin: 20px 0;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            h2 {
                font-size: 1.5em;
            }
            button {
                padding: 12px 24px;
                font-size: 16px;
            }
            #score-display {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="start-screen" class="screen">
        <h1>贪吃蛇游戏</h1>
        <button id="start-button">开始游戏</button>
    </div>
    <div id="game-screen" class="screen" style="display: none;">
        <div id="score-display">得分: <span id="score">0</span></div>
        <canvas id="game-canvas"></canvas>
    </div>
    <div id="end-screen" class="screen" style="display: none;">
        <h2>游戏结束</h2>
        <p class="final-score">最终得分: <span id="final-score">0</span></p>
        <button id="restart-button">重新开始</button>
    </div>
    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('final-score');
        const startButton = document.getElementById('start-button');
        const restartButton = document.getElementById('restart-button');
        const gridSize = 20;
        const canvasSize = 400;
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameSpeed = 150;
        let gameInterval = null;
        let isGameRunning = false;
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreElement.textContent = score;
            generateFood();
        }
        function generateFood() {
            food = {
                x: Math.floor(Math.random() * (canvasSize / gridSize)),
                y: Math.floor(Math.random() * (canvasSize / gridSize))
            };
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }
        function draw() {
            ctx.clearRect(0, 0, canvasSize, canvasSize);
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2, 0, Math.PI * 2);
            ctx.fill();
            snake.forEach((part, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#0f3460';
                } else {
                    ctx.fillStyle = '#16213e';
                }
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeStyle = '#eaeaea';
                ctx.lineWidth = 1;
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }
        function update() {
            direction = nextDirection;
            let head = { ...snake[0] };
            switch (direction) {
                case 'up':
                    head.y--;
                    break;
                case 'down':
                    head.y++;
                    break;
                case 'left':
                    head.x--;
                    break;
                case 'right':
                    head.x++;
                    break;
            }
            if (head.x < 0 || head.x >= canvasSize / gridSize || head.y < 0 || head.y >= canvasSize / gridSize) {
                gameOver();
                return;
            }
            for (let part of snake) {
                if (part.x === head.x && part.y === head.y) {
                    gameOver();
                    return;
                }
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
                if (gameSpeed > 80) {
                    gameSpeed -= 2;
                    clearInterval(gameInterval);
                    gameInterval = setInterval(update, gameSpeed);
                }
            } else {
                snake.pop();
            }
            draw();
        }
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameInterval);
            finalScoreElement.textContent = score;
            gameScreen.style.display = 'none';
            endScreen.style.display = 'block';
        }
        function startGame() {
            initGame();
            isGameRunning = true;
            startScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            endScreen.style.display = 'none';
            gameSpeed = 150;
            gameInterval = setInterval(update, gameSpeed);
            draw();
        }
        function restartGame() {
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            startGame();
        }
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', restartGame);
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') nextDirection = 'right';
                    break;
            }
        });
        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        });
        canvas.addEventListener('touchend', (e) => {
            if (!isGameRunning) return;
            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && direction !== 'left') {
                    nextDirection = 'right';
                } else if (dx < 0 && direction !== 'right') {
                    nextDirection = 'left';
                }
            } else {
                if (dy > 0 && direction !== 'up') {
                    nextDirection = 'down';
                } else if (dy < 0 && direction !== 'down') {
                    nextDirection = 'up';
                }
            }
            e.preventDefault();
        });
    </script>
</body>
</html>
