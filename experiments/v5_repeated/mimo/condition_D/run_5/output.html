<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼豆图纸生成器</title>
    <style>
        /* Generative Design Style */
        :root {
            --gradient-bg: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
            --gradient-btn: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-btn-success: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --shadow-soft: 0 4px 15px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 25px rgba(0, 0, 0, 0.12);
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --color-text: #2d3748;
            --color-text-light: #718096;
            --color-border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--gradient-bg);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            box-shadow: var(--shadow-soft);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--color-border);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            padding: 20px;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            min-height: calc(100vh - 70px);
        }

        /* Control Panel */
        .control-panel {
            flex: 0 0 320px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 25px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--color-border);
            height: fit-content;
            position: sticky;
            top: 90px;
        }

        .control-section {
            margin-bottom: 25px;
        }

        .control-section h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--color-text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--gradient-btn);
            border-radius: 2px;
        }

        /* File Upload Area */
        .upload-area {
            border: 3px dashed var(--color-border);
            border-radius: var(--radius-md);
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(102, 126, 234, 0.03);
        }

        .upload-area:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.08);
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: rgba(118, 75, 162, 0.1);
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #667eea;
        }

        .upload-text {
            font-size: 0.95rem;
            color: var(--color-text-light);
            margin-bottom: 5px;
        }

        .upload-hint {
            font-size: 0.8rem;
            color: #a0aec0;
        }

        .file-input {
            display: none;
        }

        /* Sliders */
        .slider-control {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .slider-label {
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .slider-value {
            font-weight: 700;
            color: #667eea;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(to right, #e2e8f0, #667eea);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--gradient-btn);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        /* Grid Size Selector */
        .grid-size-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .grid-size-btn {
            padding: 10px;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            text-align: center;
        }

        .grid-size-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .grid-size-btn.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--gradient-btn);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 15px;
            display: none;
        }

        .progress-container.visible {
            display: block;
        }

        .progress-bar {
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-btn-success);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 5px;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--color-text-light);
            text-align: center;
        }

        /* Preview Image */
        .preview-container {
            margin-top: 15px;
            display: none;
            text-align: center;
        }

        .preview-container.visible {
            display: block;
        }

        .preview-image {
            max-width: 100%;
            max-height: 150px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--color-border);
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .canvas-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--color-border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .canvas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(102, 126, 234, 0.03);
            border-bottom: 1px solid var(--color-border);
        }

        .canvas-title {
            font-weight: 600;
            color: var(--color-text);
        }

        .canvas-controls {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 1.1rem;
        }

        .btn-icon:hover {
            border-color: #667eea;
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .canvas-wrapper {
            position: relative;
            flex: 1;
            overflow: hidden;
            background: #f8fafc;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mainCanvas {
            background: white;
            cursor: grab;
        }

        #mainCanvas:active {
            cursor: grabbing;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-light);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .empty-hint {
            font-size: 0.9rem;
        }

        /* Stats Panel */
        .stats-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 25px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--color-border);
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stats-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-text);
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .stats-table thead th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .stats-table tbody tr {
            transition: background-color 0.2s;
        }

        .stats-table tbody tr:hover {
            background-color: rgba(102, 126, 234, 0.05);
        }

        .stats-table td {
            padding: 10px 15px;
            border-bottom: 1px solid var(--color-border);
            font-size: 0.9rem;
        }

        .color-preview {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 2px solid rgba(0,0,0,0.15);
            margin-right: 10px;
            vertical-align: middle;
        }

        .total-row {
            font-weight: 700;
            background: rgba(102, 126, 234, 0.05);
        }

        /* Tooltip */
        .tooltip {
            position: fixed;
            background: rgba(45, 55, 72, 0.95);
            color: white;
            padding: 10px 15px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            max-width: 200px;
        }

        .tooltip.visible {
            opacity: 1;
        }

        /* Error Message */
        .error-message {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #fed7d7;
            color: #c53030;
            padding: 15px 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-soft);
            z-index: 1000;
            display: none;
            max-width: 400px;
            border: 1px solid #feb2b2;
        }

        .error-message.visible {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        .error-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .error-close {
            background: none;
            border: none;
            color: #c53030;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: auto;
            flex-shrink: 0;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
            }
            
            .control-panel {
                flex: none;
                position: static;
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 12px 15px;
            }
            
            .header h1 {
                font-size: 1.2rem;
            }
            
            .main-container {
                padding: 15px;
                gap: 15px;
            }
            
            .control-panel {
                padding: 20px;
            }
            
            .grid-size-selector {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            
            .grid-size-btn {
                padding: 8px;
                font-size: 0.9rem;
            }
            
            .stats-table td,
            .stats-table th {
                padding: 8px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>🧩 拼豆图纸生成器</h1>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Control Panel -->
        <aside class="control-panel">
            <!-- Upload Section -->
            <div class="control-section">
                <h3>上传图片</h3>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击或拖拽图片到此处</div>
                    <div class="upload-hint">支持 JPG, PNG, WEBP (最大 10MB)</div>
                </div>
                <input type="file" class="file-input" id="fileInput" accept="image/jpeg,image/png,image/webp">
                <div class="preview-container" id="previewContainer">
                    <img class="preview-image" id="previewImage" alt="预览">
                </div>
            </div>

            <!-- Grid Size Section -->
            <div class="control-section">
                <h3>网格尺寸</h3>
                <div class="grid-size-selector">
                    <button class="grid-size-btn" data-size="32">32×32</button>
                    <button class="grid-size-btn active" data-size="48">48×48</button>
                    <button class="grid-size-btn" data-size="64">64×64</button>
                </div>
            </div>

            <!-- Color Count Section -->
            <div class="control-section">
                <h3>颜色数量</h3>
                <div class="slider-control">
                    <div class="slider-label">
                        <span>颜色数</span>
                        <span class="slider-value" id="colorCountValue">15</span>
                    </div>
                    <input type="range" id="colorCount" min="10" max="20" value="15">
                </div>
            </div>

            <!-- Generate Button -->
            <div class="control-section">
                <button class="btn btn-primary" id="generateBtn" disabled>
                    <span>✨</span>
                    <span>生成拼豆图纸</span>
                </button>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">准备中...</div>
                </div>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main class="canvas-area">
            <!-- Canvas Container -->
            <div class="canvas-container">
                <div class="canvas-header">
                    <div class="canvas-title">📐 拼豆图纸预览</div>
                    <div class="canvas-controls">
                        <button class="btn-icon" id="zoomInBtn" title="放大">🔍+</button>
                        <button class="btn-icon" id="zoomOutBtn" title="缩小">🔍-</button>
                        <button class="btn-icon" id="fitBtn" title="适应窗口">⬜</button>
                    </div>
                </div>
                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="mainCanvas" width="480" height="480"></canvas>
                    <!-- Empty State -->
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">🎨</div>
                        <div class="empty-text">开始创建你的拼豆图纸</div>
                        <div class="empty-hint">上传图片后，调整参数并点击生成</div>
                    </div>
                </div>
            </div>

            <!-- Stats Panel -->
            <div class="stats-panel" id="statsPanel" style="display: none;">
                <div class="stats-header">
                    <div class="stats-title">📊 颜色统计</div>
                    <div id="totalCount"></div>
                </div>
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>颜色</th>
                            <th>色值</th>
                            <th>数量</th>
                            <th>占比</th>
                        </tr>
                    </thead>
                    <tbody id="statsBody">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage">
        <span class="error-icon">⚠️</span>
        <span id="errorText"></span>
        <button class="error-close" id="errorClose">×</button>
    </div>

    <script>
    // ============================================================
    // 模块1: UI 控制器
    // ============================================================
    window.UI = (() => {
        // DOM Elements
        const elements = {
            uploadArea: document.getElementById('uploadArea'),
            fileInput: document.getElementById('fileInput'),
            previewContainer: document.getElementById('previewContainer'),
            previewImage: document.getElementById('previewImage'),
            gridSizeBtns: document.querySelectorAll('.grid-size-btn'),
            colorCount: document.getElementById('colorCount'),
            colorCountValue: document.getElementById('colorCountValue'),
            generateBtn: document.getElementById('generateBtn'),
            progressContainer: document.getElementById('progressContainer'),
            progressFill: document.getElementById('progressFill'),
            progressText: document.getElementById('progressText'),
            emptyState: document.getElementById('emptyState'),
            statsPanel: document.getElementById('statsPanel'),
            statsBody: document.getElementById('statsBody'),
            totalCount: document.getElementById('totalCount'),
            errorMessage: document.getElementById('errorMessage'),
            errorText: document.getElementById('errorText'),
            errorClose: document.getElementById('errorClose'),
            zoomInBtn: document.getElementById('zoomInBtn'),
            zoomOutBtn: document.getElementById('zoomOutBtn'),
            fitBtn: document.getElementById('fitBtn')
        };

        let uploadedFile = null;
        let selectedGridSize = 48;

        // Initialize UI
        const init = () => {
            // File Upload - Click
            elements.uploadArea.addEventListener('click', () => {
                elements.fileInput.click();
            });

            elements.fileInput.addEventListener('change', handleFileSelect);

            // File Upload - Drag & Drop
            elements.uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                elements.uploadArea.classList.add('dragover');
            });

            elements.uploadArea.addEventListener('dragleave', () => {
                elements.uploadArea.classList.remove('dragover');
            });

            elements.uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                elements.uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });

            // Grid Size Buttons
            elements.gridSizeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    elements.gridSizeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedGridSize = parseInt(btn.dataset.size);
                });
            });

            // Color Count Slider
            elements.colorCount.addEventListener('input', (e) => {
                elements.colorCountValue.textContent = e.target.value;
            });

            // Generate Button
            elements.generateBtn.addEventListener('click', handleGenerate);

            // Error Close
            elements.errorClose.addEventListener('click', hideError);

            // Zoom Controls
            elements.zoomInBtn.addEventListener('click', () => {
                if (window.CanvasRenderer) window.CanvasRenderer.zoomIn();
            });
            elements.zoomOutBtn.addEventListener('click', () => {
                if (window.CanvasRenderer) window.CanvasRenderer.zoomOut();
            });
            elements.fitBtn.addEventListener('click', () => {
                if (window.CanvasRenderer) window.CanvasRenderer.fitToView();
            });
        };

        // Handle file selection
        const handleFileSelect = (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        };

        // Handle file validation and preview
        const handleFile = (file) => {
            // Validate file type
            const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
            if (!validTypes.includes(file.type)) {
                showError('请上传 JPG, PNG 或 WEBP 格式的图片');
                return;
            }

            // Validate file size (10MB)
            if (file.size > 10 * 1024 * 1024) {
                showError('图片大小不能超过 10MB');
                return;
            }

            uploadedFile = file;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                elements.previewImage.src = e.target.result;
                elements.previewContainer.classList.add('visible');
            };
            reader.readAsDataURL(file);

            // Enable generate button
            elements.generateBtn.disabled = false;

            // Update upload area text
            elements.uploadArea.querySelector('.upload-text').textContent = file.name;
        };

        // Handle generate button click
        const handleGenerate = async () => {
            if (!uploadedFile) {
                showError('请先上传图片');
                return;
            }

            // Show progress
            elements.generateBtn.disabled = true;
            elements.progressContainer.classList.add('visible');
            elements.emptyState.style.display = 'none';

            try {
                // Load image to get ImageData
                updateProgress(10, '加载图片中...');
                const imageData = await loadImageData(uploadedFile);

                // Process image
                updateProgress(30, '处理图片中...');
                const colorCount = parseInt(elements.colorCount.value);
                const result = await window.ImageProcessor.process(imageData, selectedGridSize, colorCount);

                // Render canvas
                updateProgress(70, '渲染图纸中...');
                window.CanvasRenderer.render(result.colorMatrix, result.palette);

                // Update stats
                updateProgress(90, '生成统计...');
                updateStats(result.colorStats);

                // Show stats panel
                elements.statsPanel.style.display = 'block';

                // Hide empty state
                elements.emptyState.style.display = 'none';

                updateProgress(100, '完成！');
                setTimeout(() => {
                    elements.progressContainer.classList.remove('visible');
                    elements.generateBtn.disabled = false;
                }, 1000);

            } catch (error) {
                console.error('处理失败:', error);
                showError('图片处理失败: ' + error.message);
                elements.generateBtn.disabled = false;
                elements.progressContainer.classList.remove('visible');
            }
        };

        // Load image file to ImageData
        const loadImageData = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, img.width, img.height);
                        resolve(imageData);
                    };
                    img.onerror = () => reject(new Error('图片加载失败'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsDataURL(file);
            });
        };

        // Update progress bar
