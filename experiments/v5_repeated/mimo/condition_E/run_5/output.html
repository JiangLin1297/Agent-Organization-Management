<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼豆图纸生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4cc9f0;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --error-color: #f44336;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        
        body {
            background-color: #f5f7fa;
            color: var(--dark-color);
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }
        
        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }
        
        .controls-panel {
            background: white;
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }
        
        .panel-title {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        
        .upload-area {
            margin-bottom: 25px;
        }
        
        .upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 150px;
            border: 3px dashed var(--accent-color);
            border-radius: var(--border-radius);
            background-color: #f0f8ff;
            color: var(--primary-color);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 10px;
        }
        
        .upload-label:hover {
            background-color: #e6f7ff;
            border-color: var(--primary-color);
        }
        
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .upload-text {
            font-weight: 500;
            text-align: center;
        }
        
        .file-input {
            display: none;
        }
        
        .preview-container {
            margin-top: 15px;
            text-align: center;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 150px;
            border: 2px solid #eee;
            border-radius: 4px;
            margin-top: 10px;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
        }
        
        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            background-color: white;
            transition: var(--transition);
        }
        
        select:focus, input[type="range"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }
        
        .range-container {
            position: relative;
            margin-top: 5px;
        }
        
        .range-value {
            position: absolute;
            right: 10px;
            top: -30px;
            background: var(--primary-color);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: 0 2px 4px rgba(67, 97, 238, 0.3);
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(67, 97, 238, 0.4);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-secondary {
            background-color: #6c757d;
            color: white;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background-color: #5a6268;
        }
        
        .canvas-container {
            background: white;
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }
        
        .canvas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        
        .canvas-title {
            font-size: 1.4rem;
            color: var(--primary-color);
        }
        
        .zoom-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background-color: #f0f0f0;
            color: var(--dark-color);
            border: 1px solid #ddd;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .zoom-btn:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .zoom-info {
            font-size: 0.9rem;
            color: #666;
            min-width: 80px;
            text-align: center;
        }
        
        .canvas-wrapper {
            overflow: auto;
            border: 1px solid #eee;
            border-radius: 4px;
            background-color: #f9f9f9;
            padding: 10px;
            max-height: 600px;
            position: relative;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border: 1px solid #ddd;
            background-color: white;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--primary-color);
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .stats-container {
            margin-top: 30px;
            background: white;
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            display: none;
        }
        
        .stats-container.active {
            display: block;
        }
        
        .stats-title {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .stats-table th {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 15px;
            text-align: left;
            font-weight: 500;
        }
        
        .stats-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        
        .stats-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        
        .stats-table tr:hover {
            background-color: #f0f8ff;
        }
        
        .color-preview {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid #ddd;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        .export-btn {
            display: block;
            margin: 30px auto 0;
            padding: 15px 40px;
            font-size: 1.1rem;
        }
        
        .instructions {
            background-color: #e8f4fd;
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            margin: 20px 0;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
        }
        
        .instructions h3 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        
        .instructions ol {
            padding-left: 20px;
        }
        
        .instructions li {
            margin-bottom: 8px;
        }
        
        .hidden {
            display: none;
        }
        
        .error-message {
            color: var(--error-color);
            background-color: #ffebee;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            display: none;
        }
        
        .error-message.active {
            display: block;
        }
        
        .image-info {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>拼豆图纸生成器</h1>
            <p class="subtitle">将您的图片转换为精美的拼豆制作图纸</p>
        </header>
        
        <div class="instructions">
            <h3>使用说明：</h3>
            <ol>
                <li>上传您喜欢的图片（支持拖拽上传）</li>
                <li>选择网格尺寸和颜色数量</li>
                <li>点击"生成图纸"按钮</li>
                <li>查看生成的拼豆图纸和颜色统计</li>
                <li>可缩放查看细节</li>
            </ol>
        </div>
        
        <div class="app-container">
            <div class="controls-panel">
                <h2 class="panel-title">控制面板</h2>
                
                <div class="upload-area">
                    <label class="upload-label" for="fileInput" id="dropZone">
                        <span class="upload-icon">📷</span>
                        <span class="upload-text">点击或拖拽上传图片</span>
                    </label>
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                    <div class="preview-container" id="previewContainer">
                        <!-- 图片预览将在这里显示 -->
                    </div>
                    <div class="image-info" id="imageInfo"></div>
                    <div class="error-message" id="errorMessage"></div>
                </div>
                
                <div class="control-group">
                    <label for="gridSize">网格尺寸:</label>
                    <select id="gridSize">
                        <option value="32">32 × 32 (1024个拼豆)</option>
                        <option value="48" selected>48 × 48 (2304个拼豆)</option>
                        <option value="64">64 × 64 (4096个拼豆)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="colorCount">颜色数量: <span id="colorCountValue">15</span></label>
                    <div class="range-container">
                        <span class="range-value" id="colorCountDisplay">15色</span>
                        <input type="range" id="colorCount" min="10" max="20" value="15">
                    </div>
                </div>
                
                <button class="btn btn-primary" id="generateBtn" disabled>生成图纸</button>
                <button class="btn btn-secondary" id="resetBtn">重置设置</button>
            </div>
            
            <div class="canvas-container">
                <div class="canvas-header">
                    <h2 class="canvas-title">拼豆图纸</h2>
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomOutBtn" title="缩小">-</button>
                        <span class="zoom-info" id="zoomInfo">100%</span>
                        <button class="zoom-btn" id="zoomInBtn" title="放大">+</button>
                        <button class="zoom-btn" id="zoomResetBtn" title="重置缩放">↻</button>
                    </div>
                </div>
                
                <div class="canvas-wrapper" id="canvasWrapper">
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <p>正在处理图像，请稍候...</p>
                    </div>
                    <canvas id="canvas" width="400" height="400"></canvas>
                </div>
                
                <div style="text-align: center; margin-top: 15px;">
                    <p id="gridInfo">选择图片后生成拼豆图纸</p>
                </div>
            </div>
        </div>
        
        <div class="stats-container" id="statsContainer">
            <h2 class="stats-title">颜色统计（用于采购参考）</h2>
            <div id="statsTableContainer">
                <!-- 颜色统计表格将在这里生成 -->
            </div>
        </div>
    </div>

    <!-- 图像处理模块 -->
    <script>
    /**
     * 图像处理模块 - 拼豆图纸生成器
     * 职责：实现图像缩放、颜色量化、拼豆颜色映射和颜色统计的核心算法。
     * 接口：与前端UI兼容，输入ImageData对象，输出量化颜色、网格数据和统计信息。
     */

    // ==================== 核心数据结构定义 ====================

    /**
     * @typedef {Array<Array<[number, number, number]>>} FormatPixels
     * 二维像素数据数组，维度为 [height][width][3]，每个元素是 [R, G, B] (0-255)。
     */

    /**
     * @typedef {Array<{r: number, g: number, b: number}>} FormatPalette
     * 调色板数组，每个元素是一个颜色对象。
     */

    /**
     * @typedef {Array<Array<number>>} FormatIndexMap
     * 二维索引图，维度为 [height][width]，每个元素是调色板颜色的索引 (0 到 N-1)。
     */

    /**
     * @typedef {Array<{color: {r: number, g: number, b: number}, count: number}>} FormatStats
     * 颜色统计数组，包含每种颜色的对象和其在图纸中出现的次数。
     */

    // ==================== 图像缩放函数 ====================

    /**
     * 将图像数据缩放到指定的网格尺寸。
     * @param {ImageData} imageData - 原始图像的ImageData对象。
     * @param {number} targetWidth - 目标宽度（网格列数）。
     * @param {number} targetHeight - 目标高度（网格行数）。
     * @returns {FormatPixels} 缩放后的像素数据二维数组。
     */
    function scaleImageData(imageData, targetWidth, targetHeight) {
        // 使用Canvas进行高质量缩放
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCanvas.width = targetWidth;
        tempCanvas.height = targetHeight;

        // 将ImageData绘制到临时Canvas，利用浏览器内置算法缩放
        const srcCanvas = document.createElement('canvas');
        const srcCtx = srcCanvas.getContext('2d');
        srcCanvas.width = imageData.width;
        srcCanvas.height = imageData.height;
        srcCtx.putImageData(imageData, 0, 0);

        // 使用双三次插值进行缩放
        tempCtx.imageSmoothingEnabled = true;
        tempCtx.imageSmoothingQuality = 'high';
        tempCtx.drawImage(srcCanvas, 0, 0, targetWidth, targetHeight);

        // 提取缩放后的像素数据
        const scaledData = tempCtx.getImageData(0, 0, targetWidth, targetHeight);
        return convertImageDataToFormatPixels(scaledData);
    }

    /**
     * 辅助函数：将ImageData转换为FormatPixels格式。
     * @param {ImageData} imageData
     * @returns {FormatPixels}
     */
    function convertImageDataToFormatPixels(imageData) {
        const { width, height, data } = imageData;
        const pixels = [];
        for (let y = 0; y < height; y++) {
            const row = [];
            for (let x = 0; x < width; x++) {
                const index = (y * width + x) * 4;
                row.push([data[index], data[index + 1], data[index + 2]]); // 忽略Alpha通道
            }
            pixels.push(row);
        }
        return pixels;
    }

    // ==================== 颜色量化函数 (中位切分法) ====================

    /**
     * 使用中位切分法对图像进行颜色量化。
     * @param {FormatPixels} pixelData - 源像素数据。
     * @param {number} targetColorCount - 目标颜色数量。
     * @returns {{palette: FormatPalette, indexMap: FormatIndexMap}} 调色板和索引图。
     */
    function quantizeColors(pixelData, targetColorCount) {
        if (pixelData.length === 0 || pixelData[0].length === 0) {
            return { palette: [], indexMap: [] };
        }

        const height = pixelData.length;
        const width = pixelData[0].length;
        const allPixels = pixelData.flat(); // [H*W][3]

        // 1. 构建初始的颜色立方体（包含所有像素）
        let boxes = [createColorBox(allPixels)];

        // 2. 循环切分，直到盒子数量达到目标颜色数
        while (boxes.length < targetColorCount) {
            // 找到需要切分的盒子（体积最大或像素数最多）
            let maxVolume = -1;
            let maxIndex = -1;
            for (let i = 0; i < boxes.length; i++) {
                const volume = boxes[i].volume;
                if (volume > maxVolume && boxes[i].pixels.length > 1) { // 确保可以切分
                    maxVolume = volume;
                    maxIndex = i;
                }
            }

            // 如果没有可切分的盒子，提前退出
            if (maxIndex === -1) break;

            const boxToSplit = boxes[maxIndex];
            const [box1, box2] = splitColorBox(boxToSplit);

            // 替换被切分的盒子
            boxes.splice(maxIndex, 1, box1, box2);
        }

        // 3. 从每个盒子中提取代表性颜色（平均值）形成调色板
        const palette = boxes.map(box => {
            const r = Math.round(box.rSum / box.pixelCount);
            const g = Math.round(box.gSum / box.pixelCount);
            const b = Math.round(box.bSum / box.pixelCount);
            return { r, g, b };
        });

        // 4. 为每个原始像素分配最接近的调色板颜色索引
        const indexMap = [];
        for (let y = 0; y < height; y++) {
            const row = [];
            for (let x = 0; x < width; x++) {
                const [r, g, b] = pixelData[y][x];
                let minDistance = Infinity;
                let bestIndex = 0;
                for (let i = 0; i < palette.length; i++) {
                    const dist = colorDistance([r, g, b], [palette[i].r, palette[i].g, palette[i].b]);
                    if (dist < minDistance) {
                        minDistance = dist;
                        bestIndex = i;
                    }
                }
                row.push(bestIndex);
            }
            indexMap.push(row);
        }

        return { palette, indexMap };
    }

    /**
     * 辅助函数：创建颜色盒子。
     * @param {Array<[number, number, number]>} pixels
     * @returns {Object} 盒子对象。
     */
    function createColorBox(pixels) {
        let rMin = 255, rMax = 0;
        let gMin = 255, gMax = 0;
        let bMin = 255, bMax = 0;
        let rSum = 0, gSum = 0, bSum = 0;

        for (const [r, g, b] of pixels) {
            rMin = Math.min(rMin, r);
            rMax = Math.max(rMax, r);
            gMin = Math.min(gMin, g);
            gMax = Math.max(gMax, g);
            bMin = Math.min(bMin, b);
            bMax = Math.max(bMax, b);
            rSum += r;
            gSum += g;
            bSum += b;
        }

        const volume = (rMax - rMin) * (gMax - gMin) * (bMax - bMin);
        return {
            pixels,
            rMin, rMax, gMin, gMax, bMin, bMax,
            rSum, gSum, bSum,
            pixelCount: pixels.length,
            volume
        };
    }

    /**
     * 辅助函数：沿最长轴切分颜色盒子。
     * @param {Object} box
     * @returns {[Object, Object]} 两个新盒子。
     */
    function splitColorBox(box) {
        const { rMin, rMax, gMin, gMax, bMin, bMax, pixels } = box;
        const rRange = rMax - rMin;
        const gRange = gMax - gMin;
        const bRange = bMax - bMin;

        // 确定最长轴
        let axis;
        if (rRange >= gRange && rRange >= bRange) {
            axis = 'r';
        } else if (gRange >= rRange && gRange >= bRange) {
            axis = 'g';
        } else {
            axis = 'b';
        }

        // 沿该轴排序像素
        const sortedPixels = [...pixels].sort((a, b) => a[axisToIndex(axis)] - b[axisToIndex(axis)]);
        const medianIndex = Math.floor(sortedPixels.length / 2);

        // 分割成两个子集
        const pixels1 = sortedPixels.slice(0, medianIndex);
        const pixels2 = sortedPixels.slice(medianIndex);

        // 创建新盒子（确保非空）
        const box1 = createColorBox(pixels1.length > 0 ? pixels1 : [pixels2[0]]);
        const box2 = createColorBox(pixels2.length > 0 ? pixels2 : [pixels1[0]]);

        return [box1, box2];
    }

    /**
     * 辅助函数：将轴名转换为数组索引。
     * @param {'r'|'g'|'b'} axis
     * @returns {number}
     */
    function axisToIndex(axis) {
        return axis === 'r' ? 0 : axis === 'g' ? 1 : 2;
    }

    /**
     * 辅助函数：计算两个RGB颜色之间的欧氏距离平方。
     * @param {[number, number, number]} c1
     * @param {[number, number, number]} c2
     * @returns {number}
     */
    function colorDistance(c1, c2) {
        return (c1[0] - c2[0]) ** 2 + (c1[1] - c2[1]) ** 2 + (c1[2] - c2[2]) ** 2;
    }

    // ==================== 拼豆颜色映射函数 ====================

    /**
     * 将量化后的调色板映射到标准拼豆色板。
     * @param {FormatPalette} quantizedPalette - 量化后的调色板。
     * @returns {FormatPalette} 映射后的调色板（当前版本相同）。
     */
    function mapToPerlerColors(quantizedPalette) {
        // 在实际应用中，这里会包含一个标准色板的匹配逻辑。
        // 目前我们简化处理，直接返回量化后的颜色

    // ==================== 颜色统计函数 ====================

    /**
     * 基于索引图和调色板，计算每种颜色的使用数量。
     * @param {FormatIndexMap} indexMap - 量化索引图。
     * @param {FormatPalette} palette - 调色板。
     * @returns {FormatStats} 颜色统计数组，按出现次数降序排列。
     */
    function countColors(indexMap, palette) {
        // 初始化统计数组，长度与调色板相同
        const stats = palette.map((color, index) => ({
            color: { ...color }, // 复制颜色对象，避免修改原始调色板
            count: 0,
            index: index // 保留索引，便于后续处理
        }));

        // 遍历索引图，统计每个索引出现的次数
        for (let y = 0; y < indexMap.length; y++) {
            for (let x = 0; x < indexMap[y].length; x++) {
                const colorIndex = indexMap[y][x];
                if (colorIndex >= 0 && colorIndex < stats.length) {
                    stats[colorIndex].count++;
                }
            }
        }

        // 按出现次数降序排序
        stats.sort((a, b) => b.count - a.count);

        // 移除临时添加的index属性（如果需要纯格式输出）
        return stats.map(item => ({
            color: item.color,
            count: item.count
        }));
    }

     * @param {number} targetColors - 目标颜色数量。

     */
    async function processImageForBeadArt(imageData, gridWidth, gridHeight, targetColors) {
        return new Promise((resolve, reject) => {
            try {
                // 1. 缩放图像到网格尺寸
                const scaledPixels = scaleImageData(imageData, gridWidth, gridHeight);

                // 2. 颜色量化
                const { palette, indexMap } = quantizeColors(scaledPixels, targetColors);

                // 3. (可选) 映射到标准拼豆色板
                const finalPalette = mapToPerlerColors(palette);

                // 4. 统计颜色使用情况
                const stats = countColors(indexMap, finalPalette);

                resolve({
                    palette: finalPalette,
                    indexMap: indexMap,
                    stats: stats
                });
            } catch (error) {
                console.error("图像处理过程中出错:", error);
                reject(error);
            }
        });
    }
