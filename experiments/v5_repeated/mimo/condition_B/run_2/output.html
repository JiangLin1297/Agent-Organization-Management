<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼豆图纸生成器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:10px}
        @media(min-width:768px){body{padding:20px}}
        .app{max-width:1500px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
        .header{background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);color:#fff;padding:20px;text-align:center}
        @media(min-width:768px){.header{padding:30px}}
        .header h1{font-size:1.6rem;margin-bottom:8px}
        @media(min-width:768px){.header h1{font-size:2.5rem}}
        .header p{font-size:.85rem;opacity:.9}
        @media(min-width:768px){.header p{font-size:1.1rem}}
        .features{display:flex;justify-content:center;gap:20px;margin-top:12px;flex-wrap:wrap}
        .feature{display:flex;align-items:center;gap:5px;font-size:.8rem;opacity:.9}
        @media(min-width:768px){.feature{font-size:.95rem}}
        .main{display:flex;flex-direction:column;padding:15px;gap:15px}
        @media(min-width:1024px){.main{flex-direction:row;padding:25px;gap:25px}}
        .panel{background:#f8fafc;border-radius:12px;padding:15px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
        @media(min-width:768px){.panel{padding:20px}}
        .control-panel{width:100%}
        @media(min-width:1024px){.control-panel{width:350px;min-width:350px}}
        .output-panel{flex:1;min-width:0}
        .panel-title{font-size:1rem;color:#1e3c72;margin-bottom:15px;padding-bottom:10px;border-bottom:3px solid #667eea;display:flex;align-items:center;gap:8px}
        @media(min-width:768px){.panel-title{font-size:1.3rem}}
        .upload-area{border:3px dashed #667eea;border-radius:12px;padding:25px 15px;text-align:center;background:#fff;margin-bottom:15px;cursor:pointer;transition:all .3s}
        @media(min-width:768px){.upload-area{padding:35px 20px}}
        .upload-area:hover,.upload-area.dragover{background:#f0f4ff;border-color:#764ba2;transform:translateY(-2px)}
        .upload-area.has-file{border-color:#4caf50;border-style:solid}
        .upload-icon{font-size:48px;margin-bottom:10px}
        .upload-text{font-size:1rem;color:#555;margin-bottom:5px}
        .upload-hint{font-size:.8rem;color:#999}
        .file-info{margin-top:10px;color:#4caf50;font-weight:600;font-size:.9rem;display:none}
        #fileInput{display:none}
        .settings{margin-bottom:15px}
        .setting-group{margin-bottom:15px}
        .setting-label{display:block;margin-bottom:8px;font-weight:600;color:#333;font-size:.9rem}
        @media(min-width:768px){.setting-label{font-size:.95rem}}
        .btn-group{display:flex;flex-wrap:wrap;gap:8px}
        .opt-btn{padding:8px 12px;border:2px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-weight:500;transition:all .2s;font-size:.8rem;white-space:nowrap}
        @media(min-width:768px){.opt-btn{padding:10px 16px;font-size:.9rem}}
        .opt-btn:hover{border-color:#667eea;background:#f0f4ff}
        .opt-btn.active{border-color:#667eea;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .slider-row{display:flex;align-items:center;gap:10px}
        .slider{flex:1;height:6px;-webkit-appearance:none;appearance:none;background:#e0e0e0;border-radius:3px;outline:none}
        .slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);cursor:pointer;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2)}
        .slider-val{min-width:35px;text-align:center;font-weight:700;color:#667eea;font-size:1rem}
        .action-group{display:flex;gap:10px;margin-top:15px}
        .btn{padding:12px 16px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
        @media(min-width:768px){.btn{padding:14px 20px;font-size:1rem}}
        .gen-btn{flex:2;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .gen-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,.4)}
        .gen-btn:disabled{background:#ccc;cursor:not-allowed}
        .reset-btn{flex:1;background:#f8f9fa;color:#666;border:2px solid #ddd}
        .reset-btn:hover{background:#e9ecef}
        .preview-container{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
        @media(min-width:768px){.preview-container{padding:20px}}
        .preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px}
        .preview-title{font-size:1rem;font-weight:600;color:#333}
        .zoom-controls{display:flex;gap:6px;align-items:center;background:#f8f9fa;padding:6px 10px;border-radius:20px;flex-wrap:wrap}
        .zoom-btn{width:30px;height:30px;border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;user-select:none}
        @media(min-width:768px){.zoom-btn{width:34px;height:34px;font-size:1.1rem}}
        .zoom-btn:hover{background:#667eea;color:#fff;border-color:#667eea}
        .zoom-level{font-weight:700;min-width:50px;text-align:center;font-size:.85rem;color:#333}
        .canvas-area{width:100%;height:350px;overflow:auto;background:#f5f5f5;border-radius:8px;position:relative;cursor:grab;touch-action:none;border:1px solid #eee}
        @media(min-width:768px){.canvas-area{height:500px}}
        .canvas-area:active{cursor:grabbing}
        .canvas-wrapper{display:flex;align-items:center;justify-content:center;min-height:100%;padding:20px}
        .canvas-inner{position:relative;transform-origin:center center;transition:transform .12s ease-out}
        #patternCanvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.15)}
        #gridCanvas{position:absolute;top:0;left:0;pointer-events:none;image-rendering:pixelated;image-rendering:crisp-edges}
        .no-image{text-align:center;padding:50px 20px;color:#999;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
        @media(min-width:768px){.no-image{padding:80px 20px}}
        .no-image-icon{font-size:60px;opacity:.5}
        @media(min-width:768px){.no-image-icon{font-size:80px}}
        .info-bar{display:none;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px;background:linear-gradient(135deg,#e8eaf6,#e3f2fd);border-radius:10px;margin-bottom:12px}
        .info-bar.show{display:grid}
        .info-item{text-align:center}
        .info-value{font-size:1rem;font-weight:700;color:#1e3c72}
        @media(min-width:768px){.info-value{font-size:1.3rem}}
        .info-label{font-size:.7rem;color:#666;margin-top:2px}
        @media(min-width:768px){.info-label{font-size:.8rem}}
        .stats-panel{background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
        @media(min-width:768px){.stats-panel{padding:20px}}
        .stats-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px}
        .stats-title{font-size:1rem;font-weight:700;color:#1e3c72}
        @media(min-width:768px){.stats-title{font-size:1.2rem}}
        .stats-actions{display:flex;gap:8px;flex-wrap:wrap}
        .sm-btn{padding:6px 12px;border-radius:6px;font-size:.75rem;cursor:pointer;transition:all .2s;border:1px solid;display:flex;align-items:center;gap:4px}
        @media(min-width:768px){.sm-btn{font-size:.85rem}}
        .copy-btn{background:#e3f2fd;color:#1976d2;border-color:#90caf9}
        .copy-btn:hover{background:#bbdefb}
        .export-btn{background:#e8f5e9;color:#388e3c;border-color:#a5d6a7}
        .export-btn:hover{background:#c8e6c9}
        .print-btn{background:#fff3e0;color:#e65100;border-color:#ffcc80}
        .print-btn:hover{background:#ffe0b2}
        .table-wrap{max-height:280px;overflow-y:auto;border:1px solid #eee;border-radius:8px}
        @media(min-width:768px){.table-wrap{max-height:400px}}
        .color-table{width:100%;border-collapse:collapse;min-width:350px}
        .color-table th,.color-table td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee;font-size:.8rem}
        @media(min-width:768px){.color-table th,.color-table td{padding:12px 15px;font-size:.9rem}}
        .color-table th{background:#f5f5f5;font-weight:700;color:#555;position:sticky;top:0;z-index:10}
        .color-table tr:hover td{background:#f8f9fa}
        .swatch{width:24px;height:24px;display:inline-block;border-radius:5px;vertical-align:middle;margin-right:8px;border:2px solid #ddd;box-shadow:0 1px 3px rgba(0,0,0,.1)}
        @media(min-width:768px){.swatch{width:28px;height:28px}}
        .hex-code{font-family:Consolas,Monaco,monospace;font-size:.8rem}
        .loading-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.95);z-index:1000;justify-content:center;align-items:center;flex-direction:column}
        .loading-overlay.show{display:flex}
        .spinner{width:50px;height:50px;border:5px solid #f3f3f3;border-top:5px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px}
        @media(min-width:768px){.spinner{width:60px;height:60px}}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .loading-text{font-size:1rem;color:#333;font-weight:500}
        @media(min-width:768px){.loading-text{font-size:1.2rem}}
        .progress-box{width:200px;margin-top:15px}
        @media(min-width:768px){.progress-box{width:250px}}
        .progress-bar{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);width:0%;transition:width .3s;border-radius:3px}
        .progress-text{text-align:center;margin-top:8px;font-size:.8rem;color:#666}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:.85rem;z-index:2000;transition:transform .3s ease;white-space:nowrap}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .toggle-group{display:flex;flex-wrap:wrap;gap:8px}
        .toggle-btn{padding:8px 14px;border:2px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-weight:500;transition:all .2s;font-size:.8rem}
        @media(min-width:768px){.toggle-btn{font-size:.85rem}}
        .toggle-btn.active{border-color:#667eea;background:#f0f4ff;color:#667eea}
        .toggle-btn.active::before{content:'✓ '}
        .zoom-hint{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.7);color:#fff;padding:4px 10px;border-radius:4px;font-size:.7rem;opacity:0;transition:opacity .3s;pointer-events:none}
        .canvas-area:hover .zoom-hint{opacity:1}
        @media print{
            .control-panel,.stats-actions,.zoom-controls,.action-group,.zoom-hint,.header,.features{display:none!important}
            .canvas-area{height:auto;overflow:visible}
            .canvas-inner{transform:none!important}
            body{background:#fff;padding:0}
            .app{box-shadow:none}
            .main{flex-direction:column}
            .output-panel{width:100%}
        }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <h1>🎨 拼豆图纸生成器</h1>
        <p>上传图片，自动生成拼豆图纸，支持多种网格和智能降色</p>
        <div class="features">
            <span class="feature">📐 精确网格化</span>
            <span class="feature">🎨 智能降色</span>
            <span class="feature">🔍 无损缩放</span>
            <span class="feature">📊 颜色统计</span>
        </div>
    </header>

    <main class="main">
        <aside class="control-panel panel">
            <h2 class="panel-title">📷 图片上传</h2>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">🖼️</div>
                <div class="upload-text">点击或拖拽上传图片</div>
                <div class="upload-hint">支持 JPG, PNG, GIF, WebP</div>
                <div class="file-info" id="fileInfo"></div>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="settings">
                <h2 class="panel-title">⚙️ 参数设置</h2>
                <div class="setting-group">
                    <label class="setting-label">网格大小</label>
                    <div class="btn-group" id="gridBtns">
                        <button class="opt-btn" data-size="16">16×16</button>
                        <button class="opt-btn active" data-size="32">32×32</button>
                        <button class="opt-btn" data-size="48">48×48</button>
                        <button class="opt-btn" data-size="64">64×64</button>
                        <button class="opt-btn" data-size="96">96×96</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label class="setting-label">颜色数量: <span id="colorNum">15</span>色</label>
                    <div class="slider-row">
                        <span style="font-size:.75rem;color:#999">5</span>
                        <input type="range" min="5" max="32" value="15" class="slider" id="colorSlider">
                        <span style="font-size:.75rem;color:#999">32</span>
                    </div>
                </div>
                <div class="setting-group">
                    <label class="setting-label">降色算法</label>
                    <div class="btn-group" id="methodBtns">
                        <button class="opt-btn active" data-method="median">中位切分</button>
                        <button class="opt-btn" data-method="kmeans">K-Means</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label class="setting-label">显示选项</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" id="toggleGrid">网格线</button>
                        <button class="toggle-btn" id="toggleNum">编号</button>
                    </div>
                </div>
            </div>

            <div class="action-group">
                <button class="btn gen-btn" id="genBtn" disabled>🧩 生成图纸</button>
                <button class="btn reset-btn" id="resetBtn">🔄 重置</button>
            </div>
        </aside>

        <section class="output-panel">
            <div class="preview-container">
                <div class="preview-header">
                    <span class="preview-title">📐 图纸预览</span>
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomOut" title="缩小">−</button>
                        <span class="zoom-level" id="zoomLvl">100%</span>
                        <button class="zoom-btn" id="zoomIn" title="放大">+</button>
                        <button class="zoom-btn" id="zoomFit" title="适应窗口">⊡</button>
                        <button class="zoom-btn" id="zoomReset" title="重置">↺</button>
                    </div>
                </div>

                <div class="info-bar" id="infoBar">
                    <div class="info-item">
                        <div class="info-value" id="infoGrid">-</div>
                        <div class="info-label">网格大小</div>
                    </div>
                    <div class="info-item">
                        <div class="info-value" id="infoColors">-</div>
                        <div class="info-label">使用颜色</div>
                    </div>
                    <div class="info-item">
                        <div class="info-value" id="infoTotal">-</div>
                        <div class="info-label">拼豆总数</div>
                    </div>
                </div>

                <div class="canvas-area" id="canvasArea">
                    <div class="no-image" id="noImg">
                        <div class="no-image-icon">🧩</div>
                        <p>上传图片后点击"生成图纸"</p>
                        <p style="font-size:.75rem;color:#bbb">支持滚轮缩放、拖拽移动</p>
                    </div>
                    <div class="canvas-wrapper" id="canvasWrap" style="display:none">
                        <div class="canvas-inner" id="canvasInner">
                            <canvas id="patternCanvas"></canvas>
                            <canvas id="gridCanvas"></canvas>
                        </div>
                    </div>
                    <div class="zoom-hint">滚轮缩放 · 拖拽移动</div>
                </div>
            </div>

            <div class="stats-panel">
                <div class="stats-header">
                    <h3 class="stats-title">📊 颜色统计</h3>
                    <div class="stats-actions">
                        <button class="sm-btn copy-btn" id="copyBtn">📋 复制</button>
                        <button class="sm-btn export-btn" id="csvBtn">📄 CSV</button>
                        <button class="sm-btn print-btn" id="printBtn">🖨️ 打印</button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table class="color-table">
                        <thead><tr><th>编号</th><th>颜色</th><th>色号</th><th>数量</th><th>占比</th></tr></thead>
                        <tbody id="statsBody">
                        <tr><td colspan="5" style="text-align:center;color:#999;padding:30px">生成图纸后显示统计</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>

<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">正在处理图像...</div>
    <div class="progress-box">
        <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
        <div class="progress-text" id="progText">准备中...</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const state={
    image:null,gridSize:32,colorCount:15,method:'median',
    showGrid:true,showNumbers:false,
    zoom:1,minZoom:0.25,maxZoom:10,
    palette:[],colorMap:null,colorCounts:null,totalPixels:0,
    isDragging:false,dragStartX:0,dragStartY:0,scrollStartX:0,scrollStartY:0,
    lastTouchDist:0
};

const $=id=>document.getElementById(id);
const el={
    uploadArea:$('uploadArea'),fileInput:$('fileInput'),fileInfo:$('fileInfo'),
    gridBtns:$('gridBtns'),colorSlider:$('colorSlider'),colorNum:$('colorNum'),
    methodBtns:$('methodBtns'),
    toggleGrid:$('toggleGrid'),toggleNum:$('toggleNum'),
    genBtn:$('genBtn'),resetBtn:$('resetBtn'),
    canvasArea:$('canvasArea'),canvasWrap:$('canvasWrap'),canvasInner:$('canvasInner'),
    patternCanvas:$('patternCanvas'),gridCanvas:$('gridCanvas'),
    noImg:$('noImg'),
    infoBar:$('infoBar'),infoGrid:$('infoGrid'),infoColors:$('infoColors'),infoTotal:$('infoTotal'),
    zoomIn:$('zoomIn'),zoomOut:$('zoomOut'),zoomFit:$('zoomFit'),zoomReset:$('zoomReset'),zoomLvl:$('zoomLvl'),
    statsBody:$('statsBody'),
    copyBtn:$('copyBtn'),csvBtn:$('csvBtn'),printBtn:$('printBtn'),
    loading:$('loading'),progFill:$('progFill'),progText:$('progText'),toast:$('toast')
};

const ctx=el.patternCanvas.getContext('2d',{willReadFrequently:true});
const gridCtx=el.gridCanvas.getContext('2d');

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function showToast(msg,dur=2000){
    el.toast.textContent=msg;el.toast.classList.add('show');
    setTimeout(()=>el.toast.classList.remove('show'),dur);
}

function showLoading(t='正在处理图像...'){
    el.loading.classList.add('show');el.progText.textContent=t;el.progFill.style.width='0%';
}

function hideLoading(){el.loading.classList.remove('show')}

function updateProgress(pct,text){
    el.progFill.style.width=pct+'%';
    if(text)el.progText.textContent=text;
}

function rgbToHex(r,g,b){
    return '#'+[r,g,b].map(x=>{const h=Math.round(x).toString(16);return h.length===1?'0'+h:h}).join('');
}

function init(){
    setupFileUpload();setupOptions();setupButtons();setupZoom();setupDragScroll();setupTouchZoom();
}

function setupFileUpload(){
    el.uploadArea.addEventListener('click',()=>el.fileInput.click());
    el.uploadArea.addEventListener('dragover',e=>{e.preventDefault();el.uploadArea.classList.add('dragover')});
    el.uploadArea.addEventListener('dragleave',e=>{e.preventDefault();el.uploadArea.classList.remove('dragover')});
    el.uploadArea.addEventListener('drop',e=>{
        e.preventDefault();el.uploadArea.classList.remove('dragover');
        if(e.dataTransfer.files.length>0)handleFile(e.dataTransfer.files[0]);
    });
    el.fileInput.addEventListener('change',e=>{if(e.target.files.length>0)handleFile(e.target.files[0])});
}

function handleFile(file){
    if(!file.type.match('image.*')){alert('请上传有效的图片文件！');return;}
    const reader=new FileReader();
    reader.onload=e=>{
        const img=new Image();
        img.onload=()=>{
            state.image=img;
            el.genBtn.disabled=false;
            el.fileInfo.textContent='✅ '+file.name;
            el.fileInfo.style.display='block';
            el.uploadArea.classList.add('has-file');
            const c=el.patternCanvas;
            c.width=img.width;c.height=img.height;
            ctx.drawImage(img,0,0);
            el.noImg.style.display='none';
            el.canvasWrap.style.display='flex';
            setZoom(1);
            showToast('图片加载成功！');
        };
        img.src=e.target.result;
    };
    reader.readAsDataURL(file);
}

function setupOptions(){
    el.gridBtns.addEventListener('click',e=>{
        const btn=e.target.closest('.opt-btn');if(!btn)return;
        el.gridBtns.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');state.gridSize=parseInt(btn.dataset.size);
    });
    el.colorSlider.addEventListener('input',e=>{
        state.colorCount=parseInt(e.target.value);el.colorNum.textContent=state.colorCount;
    });
    el.methodBtns.addEventListener('click',e=>{
        const btn=e.target.closest('.opt-btn');if(!btn)return;
        el.methodBtns.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');state.method=btn.dataset.method;
    });
    el.toggleGrid.addEventListener('click',()=>{
        state.showGrid=!state.showGrid;
        el.toggleGrid.classList.toggle('active',state.showGrid);
        if(state.colorMap)renderGrid();
    });
    el.toggleNum.addEventListener('click',()=>{
        state.showNumbers=!state.showNumbers;
        el.toggleNum.classList.toggle('active',state.showNumbers);
        if(state.colorMap)renderGrid();
    });
}

function setupButtons(){
    el.genBtn.addEventListener('click',generatePattern);
    el.resetBtn.addEventListener('click',resetApp);
    el.copyBtn.addEventListener('click',copyStats);
    el.csvBtn.addEventListener('click',exportCSV);
    el.printBtn.addEventListener('click',()=>window.print());
}

function setupZoom(){
    el.zoomIn.addEventListener('click',()=>setZoom(state.zoom*1.5));
    el.zoomOut.addEventListener('click',()=>setZoom(state.zoom/1.5));
    el.zoomFit.addEventListener('click',fitToView);
    el.zoomReset.addEventListener('click',()=>{setZoom(1);scrollToCenter()});
    el.canvasArea.addEventListener('wheel',e=>{
        e.preventDefault();
        const delta=e.deltaY>0?0.85:1.15;
        setZoom(state.zoom*delta);
    },{passive:false});
}

function setZoom(newZoom){
    newZoom=Math.max(state.minZoom,Math.min(state.maxZoom,newZoom));
    if(Math.abs(newZoom-state.zoom)<0.001)return;
    state.zoom=Math.round(newZoom*100)/100;
    el.zoomLvl.textContent=Math.round(state.zoom*100)+'%';
    el.canvasInner.style.transform='scale('+state.zoom+')';
}

function fitToView(){
    if(!state.colorMap)return;
    const gs=state.gridSize;
    const pixelSize=gs<=32?16:gs<=48?12:gs<=64?10:7;
    const canvasW=gs*pixelSize;
    const areaW=el.canvasArea.clientWidth-40;
    const areaH=el.canvasArea.clientHeight-40;
    const fitZoom=Math.min(areaW/canvasW,areaH/canvasW,1);
    setZoom(Math.max(fitZoom,state.minZoom));
    scrollToCenter();
}

function scrollToCenter(){
    const area=el.canvasArea;
    area.scrollLeft=(area.scrollWidth-area.clientWidth)/2;
    area.scrollTop=(area.scrollHeight-area.clientHeight)/2;
}

function setupDragScroll(){
    const c=el.canvasArea;
    c.addEventListener('mousedown',e=>{
        if(e.target.closest('.canvas-inner')===null)return;
        state.isDragging=true;
        state.dragStartX=e.pageX;state.dragStartY=e.pageY;
        state.scrollStartX=c.scrollLeft;state.scrollStartY=c.scrollTop;
        c.style.cursor='grabbing';
    });
    window.addEventListener('mousemove',e=>{
        if(!state.isDragging)return;
        e.preventDefault();
        c.scrollLeft=state.scrollStartX-(e.pageX-state.dragStartX);
        c.scrollTop=state.scrollStartY-(e.pageY-state.dragStartY);
    });
    window.addEventListener('mouseup',()=>{state.isDragging=false;c.style.cursor='grab'});
}

function setupTouchZoom(){
    let lastDist=0;
    const c=el.canvasArea;
    c.addEventListener('touchstart',e=>{
        if(e.touches.length===2)lastDist=getTouchDist(e.touches);
    },{passive:true});
    c.addEventListener('touchmove',e=>{
        if(e.touches.length===2){
            e.preventDefault();
            const dist=getTouchDist(e.touches);
            if(lastDist>0){
                setZoom(state.zoom*(dist/lastDist));
            }
            lastDist=dist;
        }
    },{passive:false});
    c.addEventListener('touchend',()=>{lastDist=0},{passive:true});
}

function getTouchDist(touches){
    const dx=touches[0].clientX-touches[1].clientX;
    const dy=touches[0].clientY-touches[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
}

function resetApp(){
    state.image=null;state.colorMap=null;state.colorCounts=null;state.palette=[];
    el.genBtn.disabled=true;
    el.fileInfo.style.display='none';
    el.uploadArea.classList.remove('has-file');
    el.fileInput.value='';
    el.noImg.style.display='flex';
    el.canvasWrap.style.display='none';
    el.infoBar.classList.remove('show');
    el.statsBody.innerHTML='<tr><td colspan="5" style="text-align:center;color:#999;padding:30px">生成图纸后显示统计</td></tr>';
    state.zoom=1;
    el.zoomLvl.textContent='100%';
    el.canvasInner.style.transform='scale(1)';
    showToast('已重置');
}
