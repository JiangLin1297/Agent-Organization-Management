<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼豆图纸生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
            color: #1a202c;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
            padding: 28px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            padding: 20px 24px;
            background: #f7f8fc;
            border-bottom: 1px solid #e5e7eb;
            align-items: flex-end;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .tool-group label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tool-group select,
        .tool-group input[type="file"] {
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.9rem;
            background: #fff;
            transition: border-color 0.2s;
            min-width: 160px;
        }

        .tool-group select:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .file-input-wrap {
            position: relative;
        }

        .file-input-wrap input[type="file"] {
            width: 100%;
            cursor: pointer;
            border-style: dashed;
            border-color: #c4b5fd;
            background: #faf5ff;
            min-width: 200px;
        }

        .file-input-wrap input[type="file"]:hover {
            background: #f0e7ff;
            border-color: #8b5cf6;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.45);
        }

        .btn-secondary {
            background: #fff;
            color: #4f46e5;
            border: 2px solid #4f46e5;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #f0f0ff;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .content {
            display: flex;
            gap: 0;
            min-height: 500px;
        }

        .panel {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .panel-left {
            border-right: 1px solid #e5e7eb;
        }

        .panel-head {
            padding: 14px 20px;
            font-weight: 700;
            font-size: 0.95rem;
            background: #fafbfe;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            font-size: 0.75rem;
            padding: 3px 12px;
            border-radius: 20px;
            background: #ede9fe;
            color: #7c3aed;
            font-weight: 600;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #f9fafb;
            overflow: hidden;
            position: relative;
            min-height: 400px;
        }

        .canvas-area canvas,
        .canvas-area img {
            max-width: 100%;
            max-height: 460px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .placeholder {
            text-align: center;
            color: #9ca3af;
            padding: 40px;
        }

        .placeholder svg {
            width: 64px;
            height: 64px;
            fill: #d1d5db;
            margin-bottom: 16px;
        }

        .placeholder p {
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .placeholder .sub {
            font-size: 0.8rem;
            margin-top: 4px;
            color: #b0b0b0;
        }

        .zoom-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            background: #fafbfe;
            border-top: 1px solid #e5e7eb;
        }

        .zbtn {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            background: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            color: #4f46e5;
        }

        .zbtn:hover {
            background: #4f46e5;
            color: #fff;
            border-color: #4f46e5;
        }

        .zoom-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #6b7280;
            min-width: 56px;
            text-align: center;
        }

        .pattern-canvas-wrap {
            overflow: auto;
            max-width: 100%;
            max-height: 460px;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            cursor: grab;
        }

        .pattern-canvas-wrap:active {
            cursor: grabbing;
        }

        .info-bar {
            display: flex;
            gap: 20px;
            padding: 10px 24px;
            background: #f0f0ff;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.82rem;
            color: #6b7280;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .info-item strong {
            color: #4f46e5;
        }

        .stats-section {
            border-top: 2px solid #e5e7eb;
        }

        .stats-toggle {
            padding: 14px 24px;
            font-weight: 700;
            font-size: 1rem;
            background: #fafbfe;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }

        .stats-toggle:hover {
            background: #f0f0ff;
        }

        .arrow {
            transition: transform 0.3s;
            font-size: 0.85rem;
            color: #6b7280;
        }

        .arrow.open {
            transform: rotate(180deg);
        }

        .stats-body {
            max-height: 350px;
            overflow-y: auto;
            display: none;
        }

        .stats-body.open {
            display: block;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        .stats-table th {
            background: #4f46e5;
            color: #fff;
            padding: 12px 16px;
            text-align: left;
            position: sticky;
            top: 0;
            font-weight: 600;
            z-index: 1;
        }

        .stats-table td {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .stats-table tr:nth-child(even) {
            background: #fafbfe;
        }

        .stats-table tr:hover {
            background: #ede9fe;
        }

        .color-dot {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            vertical-align: middle;
            border: 2px solid #e5e7eb;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 8px;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border: 5px solid #e5e7eb;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-overlay p {
            color: #6b7280;
            font-weight: 600;
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            padding: 16px 20px;
            background: #f7f8fc;
            border-top: 1px solid #e5e7eb;
            font-size: 0.82rem;
            color: #9ca3af;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .toast.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        @media (max-width: 900px) {
            .content {
                flex-direction: column;
            }

            .panel-left {
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
            }

            .canvas-area {
                min-height: 300px;
            }

            .toolbar {
                padding: 14px 16px;
            }

            .tool-group {
                flex: 1;
                min-width: 120px;
            }

            .tool-group select,
            .tool-group input[type="file"] {
                min-width: 0;
                width: 100%;
            }

            .btn-group {
                width: 100%;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }

            .header h1 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .header {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 1.3rem;
            }

            .toolbar {
                gap: 10px;
            }

            .info-bar {
                flex-direction: column;
                gap: 4px;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🧩 拼豆图纸生成器</h1>
            <p>上传图片 → 智能降色 → 生成拼豆图纸与颜色统计</p>
        </div>

        <div class="toolbar">
            <div class="tool-group file-input-wrap">
                <label>📷 上传图片</label>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <div class="tool-group">
                <label>📐 网格大小</label>
                <select id="gridSize">
                    <option value="16">16 × 16</option>
                    <option value="24">24 × 24</option>
                    <option value="32">32 × 32</option>
                    <option value="48" selected>48 × 48</option>
                    <option value="64">64 × 64</option>
                    <option value="96">96 × 96</option>
                </select>
            </div>
            <div class="tool-group">
                <label>🎨 颜色数量</label>
                <select id="colorCount">
                    <option value="6">6 色</option>
                    <option value="8">8 色</option>
                    <option value="10">10 色</option>
                    <option value="12">12 色</option>
                    <option value="15" selected>15 色</option>
                    <option value="20">20 色</option>
                    <option value="25">25 色</option>
                    <option value="30">30 色</option>
                </select>
            </div>
            <div class="tool-group">
                <label>🔧 降色算法</label>
                <select id="quantMethod">
                    <option value="median-cut" selected>中位切分法</option>
                    <option value="popularity">流行色法</option>
                </select>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="generateBtn" disabled>
                    ✨ 生成图纸
                </button>
                <button class="btn btn-secondary" id="downloadBtn" disabled>
                    📥 下载图纸
                </button>
                <button class="btn btn-secondary" id="csvBtn" disabled>
                    📊 导出统计
                </button>
            </div>
        </div>

        <div id="infoBar" class="info-bar" style="display:none">
            <div class="info-item">🖼️ 原图: <strong id="infoSize">-</strong></div>
            <div class="info-item">📐 网格: <strong id="infoGrid">-</strong></div>
            <div class="info-item">🎨 颜色: <strong id="infoColors">-</strong></div>
            <div class="info-item">🧮 总拼豆: <strong id="infoTotal">-</strong></div>
        </div>

        <div class="content">
            <div class="panel panel-left">
                <div class="panel-head">
                    <span>📷 原始图片</span>
                    <span class="badge" id="imgBadge">未上传</span>
                </div>
                <div class="canvas-area" id="leftArea">
                    <div class="placeholder" id="placeholderLeft">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
                        </svg>
                        <p>请上传一张图片开始制作</p>
                        <p class="sub">支持 JPG、PNG、GIF、WebP 格式</p>
                    </div>
                    <img id="previewImg" style="display:none" alt="预览">
                </div>
            </div>

            <div class="panel panel-right">
                <div class="panel-head">
                    <span>🧩 拼豆图纸</span>
                    <span class="badge" id="patternBadge">未生成</span>
                </div>
                <div class="canvas-area" id="rightArea">
                    <div class="loading-overlay" id="loadingOverlay" style="display:none">
                        <div class="spinner"></div>
                        <p id="loadingText">正在生成图纸…</p>
                    </div>
                    <div class="placeholder" id="placeholderRight">
                        <svg viewBox="0 0 24 24">
                            <path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zM3 14h7v7H3v-7zm11 0h7v7h-7v-7z" />
                        </svg>
                        <p>生成后在此显示拼豆图纸</p>
                        <p class="sub">支持缩放查看细节</p>
                    </div>
                    <div class="pattern-canvas-wrap" id="patternWrap" style="display:none">
                        <canvas id="patternCanvas"></canvas>
                    </div>
                </div>
                <div class="zoom-bar" id="zoomBar" style="display:none">
                    <button class="zbtn" id="zoomOut" title="缩小">−</button>
                    <span class="zoom-label" id="zoomLabel">100%</span>
                    <button class="zbtn" id="zoomIn" title="放大">+</button>
                    <button class="zbtn" id="zoomReset" title="重置缩放" style="font-size:0.9rem">↺</button>
                </div>
            </div>
        </div>

        <div class="stats-section" id="statsSection" style="display:none">
            <div class="stats-toggle" id="statsToggle">
                <span>📊 颜色统计（<span id="statsCount">0</span> 种颜色，共 <span id="statsTotal">0</span> 颗拼豆）</span>
                <span class="arrow" id="statsArrow">▼</span>
            </div>
            <div class="stats-body" id="statsBody">
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>颜色</th>
                            <th>HEX</th>
                            <th>RGB</th>
                            <th>数量</th>
                            <th>占比</th>
                        </tr>
                    </thead>
                    <tbody id="statsTbody"></tbody>
                </table>
            </div>
        </div>

        <footer>
            拼豆图纸生成器 · 纯前端实现 · 所有数据本地处理不上传服务器
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (() => {
            // ==================== DOM 元素 ====================
            const fileInput = document.getElementById('fileInput');
            const gridSizeSel = document.getElementById('gridSize');
            const colorCountSel = document.getElementById('colorCount');
            const quantMethodSel = document.getElementById('quantMethod');
            const generateBtn = document.getElementById('generateBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const csvBtn = document.getElementById('csvBtn');
            const previewImg = document.getElementById('previewImg');
            const placeholderLeft = document.getElementById('placeholderLeft');
            const placeholderRight = document.getElementById('placeholderRight');
            const patternWrap = document.getElementById('patternWrap');
            const patternCanvas = document.getElementById('patternCanvas');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const zoomBar = document.getElementById('zoomBar');
            const zoomIn = document.getElementById('zoomIn');
            const zoomOut = document.getElementById('zoomOut');
            const zoomReset = document.getElementById('zoomReset');
            const zoomLabel = document.getElementById('zoomLabel');
            const imgBadge = document.getElementById('imgBadge');
            const patternBadge = document.getElementById('patternBadge');
            const infoBar = document.getElementById('infoBar');
            const infoSize = document.getElementById('infoSize');
            const infoGrid = document.getElementById('infoGrid');
            const infoColors = document.getElementById('infoColors');
            const infoTotal = document.getElementById('infoTotal');
            const statsSection = document.getElementById('statsSection');
            const statsToggle = document.getElementById('statsToggle');
            const statsBody = document.getElementById('statsBody');
            const statsArrow = document.getElementById('statsArrow');
            const statsTbody = document.getElementById('statsTbody');
            const statsCount = document.getElementById('statsCount');
            const statsTotal = document.getElementById('statsTotal');
            const toastEl = document.getElementById('toast');

            // ==================== 状态变量 ====================
            let uploadedImg = null;
            let zoom = 1;
            let lastColorCounts = null;
            let currentGrid = 48;

            // ==================== Toast 提示 ====================
            function showToast(msg, type = 'success') {
                toastEl.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
                toastEl.className = 'toast ' + type;
                setTimeout(() => toastEl.classList.add('show'), 10);
                setTimeout(() => toastEl.classList.remove('show'), 3000);
            }

            // ==================== 缩放控制 ====================
            function applyZoom() {
                patternCanvas.style.transform = 'scale(' + zoom + ')';
                patternCanvas.style.transformOrigin = 'top left';
                zoomLabel.textContent = Math.round(zoom * 100) + '%';
            }

            zoomIn.addEventListener('click', function () {
                zoom = Math.min(5, zoom + 0.25);
                applyZoom();
            });

            zoomOut.addEventListener('click', function () {
                zoom = Math.max(0.25, zoom - 0.25);
                applyZoom();
            });

            zoomReset.addEventListener('click', function () {
                zoom = 1;
                applyZoom();
            });

            // ==================== 统计面板切换 ====================
            statsToggle.addEventListener('click', function () {
                statsBody.classList.toggle('open');
                statsArrow.classList.toggle('open');
            });

            // ==================== 文件上传 ====================
            fileInput.addEventListener('change', function (e) {
                var file = e.target.files[0];
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    showToast('请上传图片文件', 'error');
                    return;
                }

                var reader = new FileReader();
                reader.onload = function (ev) {
                    var img = new Image();
                    img.onload = function () {
                        uploadedImg = img;
                        previewImg.src = ev.target.result;
                        previewImg.style.display = 'block';
                        placeholderLeft.style.display = 'none';
                        imgBadge.textContent = img.width + ' × ' + img.height + ' px';
                        infoSize.textContent = img.width + ' × ' + img.height + ' px';
                        generateBtn.disabled = false;
                        downloadBtn.disabled = true;
                        csvBtn.disabled = true;
                        showToast('图片加载成功');
                    };
                    img.onerror = function () {
                        showToast('图片加载失败', 'error');
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            // ==================== 生成图纸 ====================
            generateBtn.addEventListener('click', function () {
                if (!uploadedImg) return;
                generateBtn.disabled = true;
                downloadBtn.disabled = true;
                csvBtn.disabled = true;
                loadingOverlay.style.display = 'flex';
                loadingText.textContent = '正在处理图片…';
                setTimeout(doGenerate, 80);
            });

            function doGenerate() {
                try {
                    var grid = parseInt(gridSizeSel.value);
                    var nColors = parseInt(colorCountSel.value);
                    var method = quantMethodSel.value;
                    currentGrid = grid;

                    loadingText.textContent = '正在缩放图片…';

                    // 1) 缩放图片到网格大小
                    var resized = resizeImage(uploadedImg, grid, grid);

                    loadingText.textContent = '正在计算颜色…';

                    // 2) 颜色量化
                    var palette;
                    if (method === 'median-cut') {
                        palette = medianCutQuantize(resized, nColors);
                    } else {
                        palette = popularityQuantize(resized, nColors);
                    }

                    loadingText.textContent = '正在映射颜色…';

                    // 3) 映射每个像素到最近的调色板颜色
                    var pixelData = resized.data;
                    var mappedColors = new Array(grid * grid);
                    var counts = {};

                    for (var i = 0; i < grid * grid; i++) {
                        var r = pixelData[i * 4];
                        var g = pixelData[i * 4 + 1];
                        var b = pixelData[i * 4 + 2];
                        var c = findClosestColor(r, g, b, palette);
                        mappedColors[i] = c;
                        var key = c.r + ',' + c.g + ',' + c.b;
                        if (!counts[key]) counts[key] = 0;
                        counts[key]++;
                    }

                    loadingText.textContent = '正在绘制图纸…';

                    // 4) 绘制拼豆图纸
                    drawPattern(mappedColors, grid, counts);

                    // 5) 更新UI
                    updateStats(counts, grid);

                ctx.imageSmoothingEnabled = true;

                return ctx.getImageData(0, 0, w, h);
            }

            // ==================== 中位切分法 ====================
            function medianCutQuantize(imageData, targetColors) {
                var data = imageData.data;
                var colors = [];
                for (var i = 0; i < data.length; i += 4) {
                    colors.push([data[i], data[i + 1], data[i + 2]]);

                var result = medianCutRecursive(colors, targetColors);
                return result.map(function (c) {
                    return { r: Math.round(c[0]), g: Math.round(c[1]), b: Math.round(c[2]) };
                });
            }

            function medianCutRecursive(colors, n) {
                if (n <= 1 || colors.length === 0) {
                    return [computeAverageColor(colors)];
                }

                var rMin = 255, rMax = 0, gMin = 255, gMax = 0, bMin = 255, bMax = 0;
                for (var i = 0; i < colors.length; i++) {
                    var c = colors[i];
                    if (c[0] < rMin) rMin = c[0];
                    if (c[0] > rMax) rMax = c[0];
                    if (c[1] < gMin) gMin = c[1];
                    if (c[1] > gMax) gMax = c[1];
                    if (c[2] < bMin) bMin = c[2];
                    if (c[2] > bMax) bMax = c[2];
                }

                var rRange = rMax - rMin;
                var gRange = gMax - gMin;
                var bRange = bMax - bMin;

                var sortChannel = 0;
                if (gRange >= rRange && gRange >= bRange) sortChannel = 1;
                else if (bRange >= rRange && bRange >= gRange) sortChannel = 2;

                colors.sort(function (a, b) { return a[sortChannel] - b[sortChannel]; });

                var mid = Math.floor(colors.length / 2);
                var leftN = Math.ceil(n / 2);
                var rightN = n - leftN;

                var left = medianCutRecursive(colors.slice(0, mid), leftN);
                var right = medianCutRecursive(colors.slice(mid), rightN);
                return left.concat(right);
            }

            // ==================== 流行色法 ====================
            function popularityQuantize(imageData, targetColors) {
                var data = imageData.data;
                var colorMap = {};

                for (var i = 0; i < data.length; i += 4) {
                    var r = Math.round(data[i] / 8) * 8;
                    var g = Math.round(data[i + 1] / 8) * 8;
                    var b = Math.round(data[i + 2] / 8) * 8;
                    var key = r + ',' + g + ',' + b;
                    if (!colorMap[key]) {
                        colorMap[key] = { r: r, g: g, b: b, count: 0 };
                    }
                    colorMap[key].count++;
                }

                var sorted = Object.values(colorMap).sort(function (a, b) { return b.count - a.count; });
                var palette = sorted.slice(0, targetColors).map(function (c) {
                    return { r: c.r, g: c.g, b: c.b };
                });

                return palette;
            }

            // ==================== 计算平均颜色 ====================
            function computeAverageColor(colors) {
                if (colors.length === 0) return [128, 128, 128];
                var r = 0, g = 0, b = 0;
                for (var i = 0; i < colors.length; i++) {
                    r += colors[i][0];
                    g += colors[i][1];
                    b += colors[i][2];
                }
                var n = colors.length;
                return [Math.round(r / n), Math.round(g / n), Math.round(b / n)];
            }
