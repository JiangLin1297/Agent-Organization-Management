<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>拼豆图纸生成器 · 纯前端</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f5f3f0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1.2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            padding: 1.8rem 1.5rem 2.5rem;
        }
        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.01em;
            color: #2c2c2c;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #6b6b6b;
            margin-left: auto;
        }
        .upload-area {
            background: #faf9f7;
            border: 2px dashed #d0cdc8;
            border-radius: 24px;
            padding: 2.2rem 1rem;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
            margin-bottom: 1.8rem;
        }
        .upload-area:hover {
            border-color: #b0a8a0;
            background: #f6f4f1;
        }
        .upload-area input {
            display: none;
        }
        .upload-label {
            font-weight: 500;
            color: #3d3d3d;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }
        .upload-label span {
            background: #eae7e2;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #2e2e2e;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem 1.5rem;
            background: #f8f7f5;
            padding: 0.9rem 1.4rem;
            border-radius: 40px;
            margin-bottom: 1.8rem;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .control-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #3f3f3f;
        }
        select, input[type="range"] {
            background: white;
            border: 1px solid #d6d2cc;
            border-radius: 30px;
            padding: 0.3rem 0.8rem;
            font-size: 0.9rem;
            font-weight: 400;
            outline: none;
        }
        select {
            padding-right: 1.8rem;
            appearance: auto;
        }
        .range-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .range-wrap input {
            width: 110px;
        }
        .range-value {
            min-width: 2rem;
            font-weight: 500;
            color: #1f1f1f;
        }
        .action-btn {
            background: #2c2c2c;
            border: none;
            color: white;
            padding: 0.4rem 1.4rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            margin-left: auto;
            white-space: nowrap;
        }
        .action-btn:active {
            transform: scale(0.94);
        }
        .action-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .canvas-wrapper {
            background: #f0eeeb;
            border-radius: 28px;
            padding: 0.8rem;
            margin: 1.2rem 0 1.5rem;
            display: flex;
            justify-content: center;
            overflow: auto;
            position: relative;
        }
        #previewCanvas {
            display: block;
            width: 100%;
            height: auto;
            max-width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: pan-x pan-y;
        }
        .zoom-controls {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 0.2rem 0 1.2rem;
        }
        .zoom-controls button {
            background: #eae7e2;
            border: none;
            border-radius: 30px;
            padding: 0.3rem 1.2rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1f1f1f;
            cursor: pointer;
            transition: 0.1s;
        }
        .zoom-controls button:active {
            background: #d4cfc8;
        }
        .stats-section {
            background: #faf9f7;
            border-radius: 24px;
            padding: 1.2rem 1.2rem 1.5rem;
            margin-top: 0.8rem;
        }
        .stats-section h3 {
            font-weight: 500;
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            color: #2c2c2c;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stats-table-wrap {
            max-height: 280px;
            overflow-y: auto;
            border-radius: 16px;
            background: white;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: #f0eeeb;
            padding: 0.6rem 0.5rem;
            font-weight: 500;
            color: #1f1f1f;
            position: sticky;
            top: 0;
            background: #eceae6;
        }
        td {
            padding: 0.5rem 0.5rem;
            border-bottom: 1px solid #e6e2dc;
        }
        .color-swatch {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.06);
            vertical-align: middle;
            margin-right: 0.4rem;
        }
        .empty-state {
            color: #7a7a7a;
            text-align: center;
            padding: 2rem 0.5rem;
        }
        .footer-note {
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: #8b8780;
            text-align: center;
        }
        @media (max-width: 600px) {
            .app { padding: 1rem 0.8rem; }
            .controls { flex-direction: column; align-items: stretch; gap: 0.8rem; }
            .action-btn { margin-left: 0; width: 100%; text-align: center; }
            .range-wrap input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="app">
    <h1>
        🧩 拼豆图纸
        <small>像素化 · 降色 · 统计</small>
    </h1>

    <!-- 上传 -->
    <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*" />
        <div class="upload-label">
            <span>📁 点击上传图片</span>
            <div style="font-weight: 300; font-size: 0.85rem; color: #6b6b6b;">JPG / PNG / WebP</div>
        </div>
    </div>

    <!-- 控制栏 -->
    <div class="controls">
        <div class="control-group">
            <label for="gridSelect">网格</label>
            <select id="gridSelect">
                <option value="32">32×32</option>
                <option value="48" selected>48×48</option>
                <option value="64">64×64</option>
            </select>
        </div>
        <div class="control-group">
            <label for="colorRange">颜色</label>
            <div class="range-wrap">
                <input type="range" id="colorRange" min="8" max="24" value="16" step="1">
                <span class="range-value" id="colorValue">16</span>
            </div>
        </div>
        <button class="action-btn" id="generateBtn">✨ 生成图纸</button>
    </div>

    <!-- 画布 + 缩放 -->
    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="previewCanvas" width="480" height="480"></canvas>
    </div>
    <div class="zoom-controls">
        <button id="zoomOutBtn">− 缩小</button>
        <button id="zoomInBtn">+ 放大</button>
        <button id="resetZoomBtn">◉ 重置</button>
    </div>

    <!-- 颜色统计 -->
    <div class="stats-section" id="statsSection">
        <h3>📊 颜色数量统计 <span style="font-weight: 400; font-size: 0.85rem; color: #5f5f5f;">（按采购参考）</span></h3>
        <div class="stats-table-wrap" id="statsTableWrap">
            <div class="empty-state">⬆️ 上传图片并点击「生成图纸」</div>
        </div>
    </div>
    <div class="footer-note">拼豆图纸 · 纯前端 · 中位切分降色</div>
</div>

<script>
    (function() {
        // DOM 元素
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const gridSelect = document.getElementById('gridSelect');
        const colorRange = document.getElementById('colorRange');
        const colorValue = document.getElementById('colorValue');
        const generateBtn = document.getElementById('generateBtn');
        const statsWrap = document.getElementById('statsTableWrap');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const resetZoomBtn = document.getElementById('resetZoomBtn');

        // 状态
        let sourceImage = null;          // 原始图片 (Image)
        let processedImageData = null;   // 处理后的 ImageData (网格+降色)
        let currentZoom = 1.0;
        const BASE_SIZE = 480;           // 画布基础逻辑尺寸

        // 初始化画布
        canvas.width = BASE_SIZE;
        canvas.height = BASE_SIZE;
        ctx.imageSmoothingEnabled = false;

        // ---- 工具函数 ----
        function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

        // 中位切分降色 (简单实现, 固定迭代)
        function medianCutQuantize(imageData, maxColors) {
            const pixels = [];
            const data = imageData.data;
            const w = imageData.width, h = imageData.height;
            for (let i = 0; i < w * h; i++) {
                const offset = i * 4;
                pixels.push([data[offset], data[offset+1], data[offset+2]]);
            }
            if (pixels.length === 0) return imageData;

            // 递归切分
            function cut(box, depth) {
                if (box.length <= 1 || depth >= 8) return [averageColor(box)];
                // 选择范围最大的通道
                let minR = 255, maxR = 0, minG = 255, maxG = 0, minB = 255, maxB = 0;
                for (const p of box) {
                    if (p[0] < minR) minR = p[0]; if (p[0] > maxR) maxR = p[0];
                    if (p[1] < minG) minG = p[1]; if (p[1] > maxG) maxG = p[1];
                    if (p[2] < minB) minB = p[2]; if (p[2] > maxB) maxB = p[2];
                }
                const rangeR = maxR - minR, rangeG = maxG - minG, rangeB = maxB - minB;
                let channel = 0;
                if (rangeG >= rangeR && rangeG >= rangeB) channel = 1;
                else if (rangeB >= rangeR && rangeB >= rangeG) channel = 2;
                // 按通道排序
                box.sort((a, b) => a[channel] - b[channel]);
                const medianIdx = Math.floor(box.length / 2);
                const left = box.slice(0, medianIdx);
                const right = box.slice(medianIdx);
                // 如果切分后某一半为空，返回平均
                if (left.length === 0 || right.length === 0) return [averageColor(box)];
                const colorsLeft = cut(left, depth + 1);
                const colorsRight = cut(right, depth + 1);
                return colorsLeft.concat(colorsRight);
            }

            function averageColor(arr) {
                let r = 0, g = 0, b = 0;
                for (const p of arr) { r += p[0]; g += p[1]; b += p[2]; }
                const len = arr.length || 1;
                return [Math.round(r/len), Math.round(g/len), Math.round(b/len)];
            }

            // 限制颜色数量 (合并相近色)
            let palette = cut(pixels, 0);
            // 去重 & 合并 (简单合并: 如果颜色数量超过maxColors, 用k-means一次迭代近似)
            if (palette.length > maxColors) {
                // 用k-means简化 (一次迭代, 随机种子)
                const k = maxColors;
                // 从palette中选k个作为初始质心 (均匀选取)
                const centroids = [];
                const step = Math.max(1, Math.floor(palette.length / k));
                for (let i = 0; i < k && i < palette.length; i++) {
                    centroids.push([...palette[i * step % palette.length]]);
                }
                // 如果质心不足, 补充随机
                while (centroids.length < k) {
                    centroids.push([128, 128, 128]);
                }
                // 迭代2次
                for (let iter = 0; iter < 2; iter++) {
                    const assignments = new Array(palette.length).fill(0);
                    for (let i = 0; i < palette.length; i++) {
                        let minDist = Infinity, best = 0;
                        for (let c = 0; c < centroids.length; c++) {
                            const d = (palette[i][0]-centroids[c][0])**2 + (palette[i][1]-centroids[c][1])**2 + (palette[i][2]-centroids[c][2])**2;
                            if (d < minDist) { minDist = d; best = c; }
                        }
                        assignments[i] = best;
                    }
                    // 更新质心
                    const sums = Array.from({ length: k }, () => [0,0,0,0]); // count
                    for (let i = 0; i < palette.length; i++) {
                        const c = assignments[i];
                        sums[c][0] += palette[i][0];
                        sums[c][1] += palette[i][1];
                        sums[c][2] += palette[i][2];
                        sums[c][3] += 1;
                    }
                    for (let c = 0; c < k; c++) {
                        if (sums[c][3] > 0) {
                            centroids[c] = [Math.round(sums[c][0]/sums[c][3]), Math.round(sums[c][1]/sums[c][3]), Math.round(sums[c][2]/sums[c][3])];
                        }
                    }
                }
                palette = centroids.map(c => [clamp(c[0],0,255), clamp(c[1],0,255), clamp(c[2],0,255)]);
            }

            // 映射每个像素到最近的颜色
            const newData = new Uint8ClampedArray(data.length);
            for (let i = 0; i < pixels.length; i++) {
                const p = pixels[i];
                let minDist = Infinity, bestColor = palette[0];
                for (const c of palette) {
                    const d = (p[0]-c[0])**2 + (p[1]-c[1])**2 + (p[2]-c[2])**2;
                    if (d < minDist) { minDist = d; bestColor = c; }
                }
                const offset = i * 4;
                newData[offset] = bestColor[0];
                newData[offset+1] = bestColor[1];
                newData[offset+2] = bestColor[2];
                newData[offset+3] = 255;
            }
            return new ImageData(newData, w, h);
        }

        // 生成网格降色图纸
        function generateGrid(image, gridSize, maxColors) {
            const w = image.width, h = image.height;
            // 1. 缩放到网格尺寸 (最近邻)
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = gridSize;
            tempCanvas.height = gridSize;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.imageSmoothingEnabled = false;
            tempCtx.drawImage(image, 0, 0, gridSize, gridSize);
            let imageData = tempCtx.getImageData(0, 0, gridSize, gridSize);
            // 2. 降色
            const quantized = medianCutQuantize(imageData, maxColors);
            // 3. 放大回显示尺寸 (用于canvas渲染)
            const displayCanvas = document.createElement('canvas');
            displayCanvas.width = BASE_SIZE;
            displayCanvas.height = BASE_SIZE;
            const displayCtx = displayCanvas.getContext('2d');
            displayCtx.imageSmoothingEnabled = false;
            // 把 quantized 绘制到 displayCanvas (最近邻缩放)
            const scaledTemp = document.createElement('canvas');
            scaledTemp.width = gridSize;
            scaledTemp.height = gridSize;
            const sCtx = scaledTemp.getContext('2d');
            sCtx.putImageData(quantized, 0, 0);
            displayCtx.drawImage(scaledTemp, 0, 0, BASE_SIZE, BASE_SIZE);
            const finalData = displayCtx.getImageData(0, 0, BASE_SIZE, BASE_SIZE);
            return {
                imageData: finalData,
                quantizedGrid: quantized,   // 原始网格尺寸
                gridSize: gridSize
            };
        }

        // 统计颜色 (基于网格量化后的数据)
        function colorStats(quantizedGrid) {
            const data = quantizedGrid.data;
            const w = quantizedGrid.width, h = quantizedGrid.height;
            const colorMap = new Map();
            for (let i = 0; i < w * h; i++) {
                const offset = i * 4;
                const r = data[offset], g = data[offset+1], b = data[offset+2];
                const key = `${r},${g},${b}`;
                if (colorMap.has(key)) {
                    colorMap.get(key).count++;
                } else {
                    colorMap.set(key, { r, g, b, count: 1 });
                }
            }
            const entries = Array.from(colorMap.values());
            entries.sort((a, b) => b.count - a.count);
            return entries;
        }

        // 渲染统计表格
        function renderStats(stats) {
            if (!stats || stats.length === 0) {
                statsWrap.innerHTML = `<div class="empty-state">暂无数据，请生成图纸</div>`;
                return;
            }
            let html = `<table><thead><tr><th>颜色</th><th>色值</th><th>数量 (格)</th></tr></thead><tbody>`;
            for (const s of stats) {
                const hex = `#${s.r.toString(16).padStart(2,'0')}${s.g.toString(16).padStart(2,'0')}${s.b.toString(16).padStart(2,'0')}`;
                html += `<tr><td><span class="color-swatch" style="background:${hex};"></span></td><td>${hex.toUpperCase()}</td><td>${s.count}</td></tr>`;
            }
            html += `</tbody></table>`;
            statsWrap.innerHTML = html;
        }

        // 更新画布 (应用缩放)
        function renderCanvasWithZoom() {
            if (!processedImageData) {
                // 清空
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            const zoom = clamp(currentZoom, 0.3, 4.0);
            const displayW = BASE_SIZE * zoom;
            const displayH = BASE_SIZE * zoom;
            canvas.width = displayW;
            canvas.height = displayH;
            ctx.imageSmoothingEnabled = false;
            // 用putImageData 需要缩放, 用drawImage 把原数据绘制
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = BASE_SIZE;
            tempCanvas.height = BASE_SIZE;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.putImageData(processedImageData, 0, 0);
            ctx.drawImage(tempCanvas, 0, 0, displayW, displayH);
        }

        // 主流程：生成图纸并更新UI
        function generateAndDisplay() {
            if (!sourceImage) {
                alert('请先上传一张图片');
                return;
            }
            const gridSize = parseInt(gridSelect.value, 10);
            const maxColors = parseInt(colorRange.value, 10);
            generateBtn.disabled = true;
            // 使用 requestAnimationFrame 避免阻塞UI
            setTimeout(() => {
                try {
                    const result = generateGrid(sourceImage, gridSize, maxColors);
                    processedImageData = result.imageData; // 480x480 的ImageData
                    // 重置缩放
                    currentZoom = 1.0;
                    renderCanvasWithZoom();
                    // 统计 (基于网格量化数据)
                    const stats = colorStats(result.quantizedGrid);
                    renderStats(stats);
                } catch (e) {
                    console.error(e);
                    alert('处理图片时出错，请重试');
                } finally {
                    generateBtn.disabled = false;
                }
            }, 20);
        }

        // ---- 事件绑定 ----
        // 上传
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            img.onload = () => {
                sourceImage = img;
                // 自动生成一次
                generateAndDisplay();
            };
            img.onerror = () => alert('图片加载失败');
            img.src = URL.createObjectURL(file);
        });

        // 生成按钮
        generateBtn.addEventListener('click', generateAndDisplay);

        // 颜色滑块显示
        colorRange.addEventListener('input', () => {
            colorValue.textContent = colorRange.value;
        });

        // 缩放
        zoomInBtn.addEventListener('click', () => {
            currentZoom = clamp(currentZoom * 1.3, 0.3, 4.0);
            renderCanvasWithZoom();
        });
        zoomOutBtn.addEventListener('click', () => {
            currentZoom = clamp(currentZoom / 1.3, 0.3, 4.0);
            renderCanvasWithZoom();
        });
        resetZoomBtn.addEventListener('click', () => {
            currentZoom = 1.0;
            renderCanvasWithZoom();
        });

        // 网格/颜色变更后自动重新生成 (如果已有图片)
        gridSelect.addEventListener('change', () => { if (sourceImage) generateAndDisplay(); });
        colorRange.addEventListener('change', () => { if (sourceImage) generateAndDisplay(); });

        // 初始状态
        renderStats(null);
        // 示例: 加载内置占位 (可选)
        // 为了更好的体验，预置一个示例图片？ 但为了保持简洁，不自动加载。
        // 但可以画一个提示
        ctx.fillStyle = '#eae7e2';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#7a7a7a';
        ctx.font = '18px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('上传图片 · 生成拼豆图纸', canvas.width/2, canvas.height/2);
    })();
</script>
</body>
</html>
