<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>拼豆图纸生成器</title>
    <style>
        /* 全局样式与响应式设计 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            padding: 1.5rem 1rem 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
            padding: 1.8rem 1.8rem 2.5rem;
        }
        h1 {
            font-weight: 600;
            font-size: 1.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            color: #0f172a;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #64748b;
            margin-left: 0.4rem;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem 1.5rem;
            background: #f8fafc;
            padding: 1rem 1.4rem;
            border-radius: 40px;
            margin-bottom: 1.8rem;
            border: 1px solid #e9edf2;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem 0.8rem;
            flex-wrap: wrap;
        }
        .control-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #334155;
        }
        .btn {
            background: white;
            border: 1px solid #d1d9e6;
            padding: 0.45rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            line-height: 1.4;
        }
        .btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        .btn-primary {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
        }
        .btn-primary:hover {
            background: #0f172a;
        }
        .btn-outline-accent {
            border-color: #cbd5e1;
            background: white;
        }
        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        select {
            background: white;
            border: 1px solid #d1d9e6;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #0f172a;
            outline: none;
            transition: 0.15s;
            min-width: 70px;
            cursor: pointer;
        }
        select:focus {
            border-color: #64748b;
            box-shadow: 0 0 0 3px rgba(100, 116, 139, 0.15);
        }
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .zoom-controls span {
            font-size: 0.8rem;
            font-weight: 500;
            min-width: 3.2rem;
            text-align: center;
            color: #334155;
        }
        .canvas-wrapper {
            background: #ffffff;
            border-radius: 24px;
            padding: 1rem;
            border: 1px solid #edf2f7;
            margin-bottom: 1.8rem;
            display: flex;
            justify-content: center;
            overflow: auto;
            position: relative;
            min-height: 200px;
        }
        #mainCanvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border-radius: 12px;
            max-width: 100%;
            height: auto;
            background: #ffffff;
        }
        .placeholder-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: #94a3b8;
            text-align: center;
            width: 100%;
        }
        .placeholder-message p {
            font-size: 0.95rem;
        }
        .stats-section {
            margin-top: 0.5rem;
        }
        .stats-section h3 {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .color-table-container {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e9edf2;
            background: #fafcff;
        }
        table.color-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 420px;
        }
        table.color-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            background: #f1f5f9;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 1px solid #dce2ec;
        }
        table.color-table td {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
        }
        table.color-table tr:last-child td {
            border-bottom: none;
        }
        .color-swatch {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.04);
            vertical-align: middle;
        }
        .color-rgb {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #334155;
        }
        .color-count {
            font-weight: 600;
            color: #0f172a;
        }
        .empty-stats {
            padding: 2rem;
            text-align: center;
            color: #94a3b8;
        }
        .loading-overlay {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 1.2rem;
            color: #1e293b;
            font-weight: 500;
        }
        .loading-overlay.active {
            display: flex;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #d1d9e6;
            border-top-color: #1e293b;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            color: #dc2626;
            background: #fef2f2;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
        }
        @media (max-width: 640px) {
            .app-container { padding: 1rem 0.8rem 1.5rem; border-radius: 24px; }
            .control-panel { padding: 0.8rem 1rem; gap: 0.8rem; border-radius: 28px; }
            .control-group { gap: 0.3rem 0.6rem; }
            .btn, select { font-size: 0.78rem; padding: 0.3rem 0.7rem; }
            h1 { font-size: 1.5rem; }
            .canvas-wrapper { padding: 0.5rem; }
            table.color-table { font-size: 0.75rem; min-width: 300px; }
            table.color-table th, table.color-table td { padding: 0.4rem 0.6rem; }
            .color-swatch { width: 22px; height: 22px; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <header>
        <h1>🧩 拼豆图纸 <small>像素转译器</small></h1>
    </header>

    <div class="control-panel" id="controlPanel">
        <div class="control-group">
            <label>📁 图片</label>
            <span class="btn btn-primary file-input-wrapper">
                上传
                <input type="file" id="imageUpload" accept="image/png,image/jpeg,image/gif,image/bmp" />
            </span>
            <button class="btn btn-outline-accent btn-sm" id="resetBtn">↺ 重置</button>
        </div>
        <div class="control-group">
            <label>📐 网格</label>
            <select id="gridSizeSelect">
                <option value="32">32×32</option>
                <option value="48" selected>48×48</option>
                <option value="64">64×64</option>
            </select>
        </div>
        <div class="control-group">
            <label>🎨 颜色</label>
            <select id="colorCountSelect">
                <option value="10">10 色</option>
                <option value="12">12 色</option>
                <option value="15" selected>15 色</option>
                <option value="18">18 色</option>
                <option value="20">20 色</option>
            </select>
        </div>
        <div class="control-group zoom-controls">
            <label>🔍</label>
            <button class="btn btn-sm" id="zoomOutBtn">−</button>
            <span id="zoomLevelDisplay">100%</span>
            <button class="btn btn-sm" id="zoomInBtn">+</button>
        </div>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="loadingIndicator" class="loading-overlay">
        <div class="spinner"></div>
        <span>处理中…</span>
    </div>

    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="mainCanvas" width="480" height="480"></canvas>
        <div class="placeholder-message" id="placeholderMessage">
            <p>上传图片即可生成拼豆图纸</p>
            <span style="font-size:0.8rem;color:#94a3b8;">支持 JPEG / PNG / GIF / BMP</span>
        </div>
    </div>

    <div class="stats-section" id="statsSection">
        <h3>📊 颜色统计 <span class="text-sm" id="totalBeads"></span></h3>
        <div class="color-table-container" id="colorTableContainer">
            <div class="empty-stats" id="emptyStats">上传图片后，颜色统计将在此显示</div>
            <table class="color-table hidden" id="colorTable">
                <thead>
                    <tr><th>色块</th><th>RGB</th><th>数量</th></tr>
                </thead>
                <tbody id="colorTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ======================== DOM 引用 ========================
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('imageUpload');
        const gridSizeSelect = document.getElementById('gridSizeSelect');
        const colorCountSelect = document.getElementById('colorCountSelect');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomLevelDisplay = document.getElementById('zoomLevelDisplay');
        const resetBtn = document.getElementById('resetBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const placeholderMessage = document.getElementById('placeholderMessage');
        const colorTable = document.getElementById('colorTable');
        const colorTableBody = document.getElementById('colorTableBody');
        const emptyStats = document.getElementById('emptyStats');
        const totalBeadsSpan = document.getElementById('totalBeads');
        const errorMessageDiv = document.getElementById('errorMessage');

        // ======================== 状态 ========================
        let currentZoom = 1.0;
        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 3.0;
        const ZOOM_STEP = 0.25;
        let currentResult = null;
        let cachedImageData = null;

        // ======================== 图像处理核心算法 (整合自 image_processing_dev) ========================
        function resizeImage(sourceData, targetWidth, targetHeight) {
            const { width: srcWidth, height: srcHeight, data: srcPixels } = sourceData;
            const targetData = new ImageData(targetWidth, targetHeight);
            const dstPixels = targetData.data;
            const xRatio = srcWidth / targetWidth;
            const yRatio = srcHeight / targetHeight;
            for (let y = 0; y < targetHeight; y++) {
                for (let x = 0; x < targetWidth; x++) {
                    const srcX = x * xRatio;
                    const srcY = y * yRatio;
                    const x1 = Math.floor(srcX);
                    const y1 = Math.floor(srcY);
                    const x2 = Math.min(x1 + 1, srcWidth - 1);
                    const y2 = Math.min(y1 + 1, srcHeight - 1);
                    const dx = srcX - x1;
                    const dy = srcY - y1;
                    const idx11 = (y1 * srcWidth + x1) * 4;
                    const idx12 = (y2 * srcWidth + x1) * 4;
                    const idx21 = (y1 * srcWidth + x2) * 4;
                    const idx22 = (y2 * srcWidth + x2) * 4;
                    const dstIdx = (y * targetWidth + x) * 4;
                    for (let c = 0; c < 4; c++) {
                        const v11 = srcPixels[idx11 + c];
                        const v12 = srcPixels[idx12 + c];
                        const v21 = srcPixels[idx21 + c];
                        const v22 = srcPixels[idx22 + c];
                        const top = v11 + (v21 - v11) * dx;
                        const bottom = v12 + (v22 - v12) * dx;
                        dstPixels[dstIdx + c] = Math.round(top + (bottom - top) * dy);
                    }
                }
            }
            return targetData;
        }

        class ColorCube {
            constructor(pixels, start, count) {
                this.pixels = pixels;
                this.start = start;
                this.count = count;
                this.level = 0;
                this.bounds = this.calculateBounds();
                this.volume = this.calculateVolume();
            }
            calculateBounds() {
                const bounds = { r: { min: 255, max: 0 }, g: { min: 255, max: 0 }, b: { min: 255, max: 0 } };
                for (let i = 0; i < this.count; i++) {
                    const idx = (this.start + i) * 4;
                    const r = this.pixels[idx], g = this.pixels[idx + 1], b = this.pixels[idx + 2];
                    bounds.r.min = Math.min(bounds.r.min, r); bounds.r.max = Math.max(bounds.r.max, r);
                    bounds.g.min = Math.min(bounds.g.min, g); bounds.g.max = Math.max(bounds.g.max, g);
                    bounds.b.min = Math.min(bounds.b.min, b); bounds.b.max = Math.max(bounds.b.max, b);
                }
                return bounds;
            }
            calculateVolume() {
                const dr = this.bounds.r.max - this.bounds.r.min + 1;
                const dg = this.bounds.g.max - this.bounds.g.min + 1;
                const db = this.bounds.b.max - this.bounds.b.min + 1;
                return dr * dg * db;
            }
            getLongestChannel() {
                const dr = this.bounds.r.max - this.bounds.r.min;
                const dg = this.bounds.g.max - this.bounds.g.min;
                const db = this.bounds.b.max - this.bounds.b.min;
                if (dr >= dg && dr >= db) return 'r';
                if (dg >= dr && dg >= db) return 'g';
                return 'b';
            }
            split() {
                if (this.count < 2) return [this];
                const channel = this.getLongestChannel();
                const channelIdx = channel === 'r' ? 0 : channel === 'g' ? 1 : 2;
                const values = [];
                for (let i = 0; i < this.count; i++) {
                    const idx = (this.start + i) * 4;
                    values.push({ index: this.start + i, value: this.pixels[idx + channelIdx] });
                }
                values.sort((a, b) => a.value - b.value);
                const median = Math.floor(this.count / 2);
                const tempPixels = new Uint8ClampedArray(this.count * 4);
                for (let i = 0; i < this.count; i++) {
                    const srcIdx = values[i].index * 4;
                    const dstIdx = i * 4;
                    tempPixels[dstIdx] = this.pixels[srcIdx];
                    tempPixels[dstIdx + 1] = this.pixels[srcIdx + 1];
                    tempPixels[dstIdx + 2] = this.pixels[srcIdx + 2];
                    tempPixels[dstIdx + 3] = this.pixels[srcIdx + 3];
                }
                for (let i = 0; i < this.count; i++) {
                    const idx = (this.start + i) * 4;
                    this.pixels[idx] = tempPixels[i * 4];
                    this.pixels[idx + 1] = tempPixels[i * 4 + 1];
                    this.pixels[idx + 2] = tempPixels[i * 4 + 2];
                    this.pixels[idx + 3] = tempPixels[i * 4 + 3];
                }
                const left = new ColorCube(this.pixels, this.start, median);
                const right = new ColorCube(this.pixels, this.start + median, this.count - median);
                left.level = this.level + 1;
                right.level = this.level + 1;
                return [left, right];
            }
            getAverageColor() {
                let r = 0, g = 0, b = 0;
                for (let i = 0; i < this.count; i++) {
                    const idx = (this.start + i) * 4;
                    r += this.pixels[idx]; g += this.pixels[idx + 1]; b += this.pixels[idx + 2];
                }
                return [Math.round(r / this.count), Math.round(g / this.count), Math.round(b / this.count)];
            }
        }

        function medianCutQuantize(imageData, targetColorCount) {
            const { width, height, data } = imageData;
            const pixelCount = width * height;
            const pixels = new Uint8ClampedArray(data);
            const rootCube = new ColorCube(pixels, 0, pixelCount);
            let cubes = [rootCube];
            while (cubes.length < targetColorCount) {
                let maxVolume = -1, splitIdx = -1;
                for (let i = 0; i < cubes.length; i++) {
                    const cube = cubes[i];
                    if (cube.count > 1 && cube.volume > maxVolume) {
                        maxVolume = cube.volume;
                        splitIdx = i;
                    }
                }
                if (splitIdx === -1) break;
                const cubeToSplit = cubes[splitIdx];
                const newCubes = cubeToSplit.split();
                cubes.splice(splitIdx, 1, ...newCubes);
            }
            const palette = cubes.map(cube => cube.getAverageColor());
            const indexMatrix = [];
            for (let y = 0; y < height; y++) {
                const row = [];
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const r = pixels[idx], g = pixels[idx + 1], b = pixels[idx + 2];
                    let minDist = Infinity, nearestIdx = 0;
                    for (let i = 0; i < palette.length; i++) {
                        const [pr, pg, pb] = palette[i];
                        const dr = r - pr, dg = g - pg, db = b - pb;
                        const dist = dr * dr + dg * dg + db * db;
                        if (dist < minDist) { minDist = dist; nearestIdx = i; }
                    }
                    row.push(nearestIdx);
                }
                indexMatrix.push(row);
            }
            return { palette, indexMatrix, gridSize: width };
        }

        function processImage(imageData, gridSize, colorCount) {
            const resizedData = resizeImage(imageData, gridSize, gridSize);
            return medianCutQuantize(resizedData, colorCount);
        }

        function calculateColorStats(result) {
            const { palette, indexMatrix } = result;
            const colorCounts = new Array(palette.length).fill(0);
            for (const row of indexMatrix) {
                for (const idx of row) {
                    colorCounts[idx]++;
                }
            }
            const stats = palette.map((color, index) => ({ color, count: colorCounts[index] }));
            stats.sort((a, b) => b.count - a.count);
            return stats;
        }

        // ======================== 核心渲染 (CanvasView) ========================
        function renderGrid(result, zoom) {
            if (!result || !result.palette || !result.indexMatrix) return;
            const { palette, indexMatrix, gridSize } = result;
            const cellSize = Math.max(1, Math.floor(8 * zoom));
            const canvasSize = gridSize * cellSize;

            canvas.width = canvasSize;
            canvas.height = canvasSize;
            ctx.clearRect(0, 0, canvasSize, canvasSize);

            // 绘制每个格子
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const colorIndex = indexMatrix[y][x];
                    const [r, g, b] = palette[colorIndex];
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                }
            }

            // 绘制网格线
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvasSize);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvasSize, i * cellSize);
                ctx.stroke();
            }

            placeholderMessage.style.display = 'none';
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 480;
            canvas.height = 480;
            placeholderMessage.style.display = 'flex';
        }

        // ======================== 颜色统计 (StatisticsPanel) ========================
        function updateColorTable(result) {
            if (!result) return;
            const stats = calculateColorStats(result);
            const totalBeads = stats.reduce((sum, s) => sum + s.count, 0);
            totalBeadsSpan.textContent = `(共 ${totalBeads} 颗)`;

            colorTableBody.innerHTML = '';
            for (const stat of stats) {
                const tr = document.createElement('tr');
                const [r, g, b] = stat.color;
                tr.innerHTML = `
                    <td><span class="color-swatch" style="background:rgb(${r},${g},${b})"></span></td>
                    <td class="color-rgb">rgb(${r}, ${g}, ${b})</td>
                    <td class="color-count">${stat.count}</td>
                `;
                colorTableBody.appendChild(tr);
            }

            emptyStats.classList.add('hidden');
            colorTable.classList.remove('hidden');
        }

        function clearColorTable() {
            colorTableBody.innerHTML = '';
            colorTable.classList.add('hidden');
            emptyStats.classList.remove('hidden');
            totalBeadsSpan.textContent = '';
        }

        // ======================== 主处理流程 ========================
        function showError(message) {
            if (message) {
                errorMessageDiv.textContent = message;
                errorMessageDiv.style.display = 'block';
            } else {
                errorMessageDiv.style.display = 'none';
            }
        }

        function showLoading(show) {
            loadingIndicator.classList.toggle('active', show);
        }

        function updateZoomDisplay() {
            zoomLevelDisplay.textContent = Math.round(currentZoom * 100) + '%';
        }

        async function handleImageProcessing(file) {
            showError(null);
            if (!file) return;

            // 文件类型校验
            const validTypes = ['image/png', 'image/jpeg', 'image/gif', 'image/bmp'];
            if (!validTypes.includes(file.type)) {
                showError('请上传图片文件 (JPEG/PNG/GIF/BMP)');
                return;
            }
            // 文件大小校验
            if (file.size > 10 * 1024 * 1024) {
                showError('图片过大 (超过10MB)，建议压缩后上传');
                return;
            }

            showLoading(true);

            try {
                const imageData = await loadImageData(file);
                cachedImageData = imageData;
                const gridSize = parseInt(gridSizeSelect.value, 10);
                const colorCount = parseInt(colorCountSelect.value, 10);

                // 使用 setTimeout 让出主线程，使加载动画得以显示
                setTimeout(() => {
                    try {
                        const result = processImage(imageData, gridSize, colorCount);
                        currentResult = result;
                        renderGrid(result, currentZoom);
                        updateColorTable(result);
                    } catch (err) {
                        showError('图像处理失败: ' + err.message);
                    } finally {
                        showLoading(false);
                    }
                }, 50);
            } catch (err) {
                showError('图片加载失败: ' + err.message);
                showLoading(false);
            }
        }

        function loadImageData(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = img.width;
                        tempCanvas.height = img.height;
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(img, 0, 0);
                        const imageData = tempCtx.getImageData(0, 0, img.width, img.height);
                        resolve(imageData);
                    };
                    img.onerror = () => reject(new Error('图片加载失败'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsDataURL(file);
            });
        }

        function resetAll() {
            clearCanvas();
            clearColorTable();
            currentResult = null;
            cachedImageData = null;
            currentZoom = 1.0;
            updateZoomDisplay();
            showError(null);
            fileInput.value = '';
            placeholderMessage.style.display = 'flex';
        }

        // ======================== 事件绑定 ========================
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleImageProcessing(file);
            }
        });

        gridSizeSelect.addEventListener('change', () => {
            if (cachedImageData) {
                handleImageProcessing(fileInput.files[0]);
            }
        });

        colorCountSelect.addEventListener('change', () => {
            if (cachedImageData) {
                handleImageProcessing(fileInput.files[0]);
            }
        });

        zoomInBtn.addEventListener('click', () => {
            currentZoom = Math.min(MAX_ZOOM, currentZoom + ZOOM_STEP);
            updateZoomDisplay();
            if (currentResult) {
                renderGrid(currentResult, currentZoom);
            }
        });

        zoomOutBtn.addEventListener('click', () => {
            currentZoom = Math.max(MIN_ZOOM, currentZoom - ZOOM_STEP);
            updateZoomDisplay();
            if (currentResult) {
                renderGrid(currentResult, currentZoom);
            }
        });

        resetBtn.addEventListener('click', resetAll);

        // 初始化
        updateZoomDisplay();
        clearCanvas();
        clearColorTable();
    })();
</script>
</body>
</html>
