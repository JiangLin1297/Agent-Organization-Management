<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼豆图纸生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f3f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #2c2b28;
            padding: 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            max-width: 1200px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.05);
            padding: 2rem 1.8rem;
        }

        h1 {
            font-weight: 500;
            font-size: 1.9rem;
            color: #1f1e1b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #eae7e2;
            padding-bottom: 1rem;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #7a7670;
            margin-left: 0.4rem;
        }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem 2rem;
            align-items: center;
            justify-content: flex-start;
            background: #faf9f7;
            padding: 1.2rem 1.5rem;
            border-radius: 48px;
            margin-bottom: 2rem;
            border: 1px solid #eae7e2;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.6rem 0.8rem;
            flex-wrap: wrap;
        }

        .control-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #4a4742;
        }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .btn-upload {
            background: #2c2b28;
            color: white;
            border: none;
            padding: 0.5rem 1.4rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: 0.15s;
            cursor: pointer;
        }
        .btn-upload:hover {
            background: #1f1e1b;
        }

        select, input[type="range"] {
            background: white;
            border: 1px solid #d6d2cc;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            font-weight: 450;
            color: #1f1e1b;
            outline: none;
            transition: 0.15s;
            min-width: 70px;
        }
        select:focus, input[type="range"]:focus {
            border-color: #8f8a82;
            box-shadow: 0 0 0 2px #eae7e2;
        }

        input[type="range"] {
            padding: 0;
            width: 120px;
            height: 6px;
            background: #d6d2cc;
            border-radius: 20px;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #2c2b28;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .range-value {
            font-weight: 500;
            min-width: 28px;
            text-align: center;
            font-size: 0.9rem;
        }

        .canvas-wrapper {
            position: relative;
            background: #f0eeeb;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 1.8rem;
            border: 1px solid #e2ded8;
            touch-action: none;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-height: 70vh;
        }

        #canvas-main {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #ffffff;
            cursor: grab;
        }
        #canvas-main:active {
            cursor: grabbing;
        }

        .canvas-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(44, 43, 40, 0.7);
            backdrop-filter: blur(4px);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            pointer-events: none;
            white-space: nowrap;
        }

        .loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 24px;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-weight: 450;
            color: #2c2b28;
            gap: 0.8rem;
            flex-direction: column;
        }
        .loading-overlay.active {
            display: flex;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e2ded8;
            border-top-color: #2c2b28;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-toast {
            background: #fae6e3;
            color: #a13d2f;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            margin-top: 0.8rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #f0cdc5;
        }
        .error-toast.active {
            display: flex;
        }

        .stats-section {
            margin-top: 0.8rem;
        }
        .stats-section h3 {
            font-weight: 500;
            font-size: 1.1rem;
            color: #2c2b28;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stats-table-container {
            max-height: 260px;
            overflow-y: auto;
            border-radius: 20px;
            border: 1px solid #eae7e2;
            background: #fcfcfa;
        }
        #stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        #stats-table th {
            background: #f3f1ed;
            font-weight: 500;
            color: #3d3a35;
            padding: 0.7rem 0.8rem;
            text-align: left;
            border-bottom: 1px solid #e2ded8;
            position: sticky;
            top: 0;
        }
        #stats-table td {
            padding: 0.5rem 0.8rem;
            border-bottom: 1px solid #efebe6;
            vertical-align: middle;
        }
        .color-preview {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.06);
            margin-right: 0.6rem;
            vertical-align: middle;
        }
        .color-hex {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #5b5750;
        }
        .color-count {
            font-weight: 500;
        }

        @media (max-width: 680px) {
            .app-container {
                padding: 1.2rem 1rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .control-panel {
                flex-direction: column;
                align-items: stretch;
                gap: 0.8rem;
                padding: 1rem 1.2rem;
                border-radius: 28px;
            }
            .control-group {
                justify-content: space-between;
            }
            .file-upload-wrapper {
                width: 100%;
            }
            .btn-upload {
                width: 100%;
                justify-content: center;
                padding: 0.7rem;
            }
            input[type="range"] {
                width: 100px;
            }
            .canvas-wrapper {
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <h1>
        🧩 拼豆图纸
        <small>上传图片 · 生成网格</small>
    </h1>

    <div class="control-panel">
        <div class="control-group">
            <label for="fileInput">📁 图片</label>
            <div class="file-upload-wrapper">
                <button class="btn-upload" id="uploadBtn">选择文件</button>
                <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp" />
            </div>
        </div>
        <div class="control-group">
            <label for="gridSizeSelect">网格</label>
            <select id="gridSizeSelect">
                <option value="32">32×32</option>
                <option value="48" selected>48×48</option>
                <option value="64">64×64</option>
            </select>
        </div>
        <div class="control-group">
            <label for="colorCountSlider">颜色 <span id="colorCountDisplay" class="range-value">15</span></label>
            <input type="range" id="colorCountSlider" min="10" max="20" value="15" step="1" />
        </div>
    </div>

    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="canvas-main"></canvas>
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <span>生成图纸中…</span>
        </div>
        <div class="canvas-hint">🖱 滚轮缩放 · 拖拽平移</div>
    </div>

    <div class="error-toast" id="errorToast">⚠️ <span id="errorMessage"></span></div>

    <div class="stats-section">
        <h3>📊 颜色统计 <span style="font-size:0.75rem; color:#8a867e;">(按数量降序)</span></h3>
        <div class="stats-table-container">
            <table id="stats-table">
                <thead>
                    <tr><th>颜色</th><th>色值</th><th>数量</th></tr>
                </thead>
                <tbody id="statsTableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ======================== 核心数据结构 ========================
        // RGBColor: { r: number, g: number, b: number }
        // QuantizedData: { palette: RGBColor[], pixelIndexMatrix: number[][] }
        // GridData: { gridSize: number, cellWidth: number, cellHeight: number, gridMatrix: number[][] }
        // ColorStatItem: { color: RGBColor, hex: string, count: number }

        // ======================== 模块A: 图像加载与预处理 ========================
        async function loadAndResizeImage(file, targetWidth, targetHeight) {
            if (!file || !file.type.startsWith('image/')) {
                throw new Error('请上传图片文件 (PNG/JPG/WebP)');
            }
            if (file.size > 10 * 1024 * 1024) {
                throw new Error('文件大小超过 10MB 限制');
            }

            const img = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const image = new Image();
                    image.onload = () => resolve(image);
                    image.onerror = () => reject(new Error('图片加载失败'));
                    image.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsDataURL(file);
            });

            if (img.width > 4096 || img.height > 4096) {
                throw new Error('图片尺寸超过 4096×4096 限制');
            }

            const offscreen = document.createElement('canvas');
            offscreen.width = targetWidth;
            offscreen.height = targetHeight;
            const ctx = offscreen.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
            return ctx.getImageData(0, 0, targetWidth, targetHeight);
        }

        // ======================== 模块B: 颜色量化 (中位切分法) ========================
        async function quantizeColors(imageData, targetColorCount) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    try {
                        const result = medianCutQuantize(imageData, targetColorCount);
                        resolve(result);
                    } catch (err) {
                        reject(err);
                    }
                }, 0);
            });
        }

        function medianCutQuantize(imageData, targetColorCount) {
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;
            const pixels = [];
            for (let i = 0; i < data.length; i += 4) {
                pixels.push({ r: data[i], g: data[i+1], b: data[i+2] });
            }

            function getRange(box) {
                let minR = 255, maxR = 0, minG = 255, maxG = 0, minB = 255, maxB = 0;
                for (const p of box) {
                    if (p.r < minR) minR = p.r;
                    if (p.r > maxR) maxR = p.r;
                    if (p.g < minG) minG = p.g;
                    if (p.g > maxG) maxG = p.g;
                    if (p.b < minB) minB = p.b;
                    if (p.b > maxB) maxB = p.b;
                }
                return { r: maxR - minR, g: maxG - minG, b: maxB - minB, minR, maxR, minG, maxG, minB, maxB };
            }

            function averageColor(box) {
                let sumR = 0, sumG = 0, sumB = 0;
                for (const p of box) {
                    sumR += p.r;
                    sumG += p.g;
                    sumB += p.b;
                }
                const len = box.length;
                return {
                    r: Math.round(sumR / len),
                    g: Math.round(sumG / len),
                    b: Math.round(sumB / len)
                };
            }

            function cutBox(box) {
                if (box.length <= 1) return [averageColor(box)];
                const range = getRange(box);
                let channel = 'r';
                if (range.g >= range.r && range.g >= range.b) channel = 'g';
                else if (range.b >= range.r && range.b >= range.g) channel = 'b';

                box.sort((a, b) => a[channel] - b[channel]);
                const medianIndex = Math.floor(box.length / 2);
                const left = box.slice(0, medianIndex);
                const right = box.slice(medianIndex);
                return [left, right];
            }

            let boxes = [pixels];
            while (boxes.length < targetColorCount) {
                let largestBoxIndex = 0;
                let largestSize = boxes[0].length;
                for (let i = 1; i < boxes.length; i++) {
                    if (boxes[i].length > largestSize) {
                        largestSize = boxes[i].length;
                        largestBoxIndex = i;
                    }
                }
                const boxToCut = boxes.splice(largestBoxIndex, 1)[0];
                const result = cutBox(boxToCut);
                if (result.length === 1) {
                    boxes.push(result[0]);
                    break;
                } else {
                    boxes.push(result[0], result[1]);
                }
                if (boxes.length >= targetColorCount * 2) break;
            }

            const palette = boxes.map(box => averageColor(box)).slice(0, targetColorCount);
            while (palette.length < targetColorCount) {
                palette.push({ r: 128, g: 128, b: 128 });
            }

            const pixelIndexMatrix = [];
            for (let y = 0; y < height; y++) {
                const row = [];
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const r = data[idx], g = data[idx+1], b = data[idx+2];
                    let minDist = Infinity;
                    let bestIdx = 0;
                    for (let i = 0; i < palette.length; i++) {
                        const dr = r - palette[i].r;
                        const dg = g - palette[i].g;
                        const db = b - palette[i].b;
                        const dist = dr*dr + dg*dg + db*db;
                        if (dist < minDist) {
                            minDist = dist;
                            bestIdx = i;
                        }
                    }
                    row.push(bestIdx);
                }
                pixelIndexMatrix.push(row);
            }

            return { palette, pixelIndexMatrix };
        }

        // ======================== 模块C: 网格映射 ========================
        function mapToGrid(quantizedData, gridSize) {
            const { palette, pixelIndexMatrix } = quantizedData;
            const srcHeight = pixelIndexMatrix.length;
            const srcWidth = pixelIndexMatrix[0].length;
            const cellHeight = srcHeight / gridSize;
            const cellWidth = srcWidth / gridSize;

            const gridMatrix = [];
            for (let gy = 0; gy < gridSize; gy++) {
                const row = [];
                for (let gx = 0; gx < gridSize; gx++) {
                    const centerY = Math.min(Math.floor((gy + 0.5) * cellHeight), srcHeight - 1);
                    const centerX = Math.min(Math.floor((gx + 0.5) * cellWidth), srcWidth - 1);
                    row.push(pixelIndexMatrix[centerY][centerX]);
                }
                gridMatrix.push(row);
            }

            return { gridSize, cellWidth, cellHeight, gridMatrix };
        }

        // ======================== 模块D: Canvas渲染与交互 ========================
        let currentScale = 1;
        let currentOffsetX = 0;
        let currentOffsetY = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;

        function renderGrid(canvasId, gridData, palette) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const { gridSize, gridMatrix } = gridData;

            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);

            const cellSize = rect.width / gridSize;

            ctx.clearRect(0, 0, rect.width, rect.height);

            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const colorIndex = gridMatrix[y][x];
                    const color = palette[colorIndex];
                    ctx.fillStyle = `rgb(${color.r},${color.g},${color.b})`;
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                }
            }

            ctx.strokeStyle = 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, rect.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(rect.width, i * cellSize);
                ctx.stroke();
            }

            currentScale = 1;
            currentOffsetX = 0;
            currentOffsetY = 0;
            canvas.style.transform = `translate(0, 0) scale(1)`;
        }

        function enableZoom(canvasId) {
            const canvas = document.getElementById(canvasId);
            const wrapper = canvas.parentElement;

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = Math.min(Math.max(currentScale * delta, 0.5), 5);
                const rect = wrapper.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const scaleChange = newScale / currentScale;
                currentOffsetX = mouseX - (mouseX - currentOffsetX) * scaleChange;
                currentOffsetY = mouseY - (mouseY - currentOffsetY) * scaleChange;
                currentScale = newScale;

                canvas.style.transformOrigin = '0 0';
                canvas.style.transform = `translate(${currentOffsetX}px, ${currentOffsetY}px) scale(${currentScale})`;
            }, { passive: false });

            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                dragStartX = e.clientX - currentOffsetX;
                dragStartY = e.clientY - currentOffsetY;
                canvas.style.cursor = 'grabbing';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                currentOffsetX = e.clientX - dragStartX;
                currentOffsetY = e.clientY - dragStartY;
                canvas.style.transform = `translate(${currentOffsetX}px, ${currentOffsetY}px) scale(${currentScale})`;
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                canvas.style.cursor = 'grab';
            });

            let lastTouchDist = 0;
            let lastTouchX = 0, lastTouchY = 0;
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
                } else if (e.touches.length === 1) {
                    isDragging = true;
                    dragStartX = e.touches[0].clientX - currentOffsetX;
                    dragStartY = e.touches[0].clientY - currentOffsetY;
                }
            }, { passive: true });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (lastTouchDist > 0) {
                        const scaleChange = dist / lastTouchDist;
                        const newScale = Math.min(Math.max(currentScale * scaleChange, 0.5), 5);
                        const rect = wrapper.getBoundingClientRect();
                        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
                        const scaleRatio = newScale / currentScale;
                        currentOffsetX = midX - (midX - currentOffsetX) * scaleRatio;
                        currentOffsetY = midY - (midY - currentOffsetY) * scaleRatio;
                        currentScale = newScale;
                        canvas.style.transformOrigin = '0 0';
                        canvas.style.transform = `translate(${currentOffsetX}px, ${currentOffsetY}px) scale(${currentScale})`;
                    }
                    lastTouchDist = dist;
                } else if (e.touches.length === 1 && isDragging) {
                    currentOffsetX = e.touches[0].clientX - dragStartX;
                    currentOffsetY = e.touches[0].clientY - dragStartY;
                    canvas.style.transform = `translate(${currentOffsetX}px, ${currentOffsetY}px) scale(${currentScale})`;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', () => {
                isDragging = false;
                lastTouchDist = 0;
            }, { passive: true });
        }

        // ======================== 模块E: 统计输出 ========================
        function generateStatistics(gridData, palette) {
            const { gridMatrix } = gridData;
            const colorCounts = new Array(palette.length).fill(0);
            for (const row of gridMatrix) {
                for (const idx of row) {
                    colorCounts[idx]++;
                }
            }

            const stats = palette.map((color, index) => {
                const hex = '#' + [color.r, color.g, color.b].map(c => c.toString(16).padStart(2, '0')).join('');
                return { color, hex, count: colorCounts[index] };
            });

            stats.sort((a, b) => b.count - a.count);
            return stats;
        }

        function renderStatisticsTable(tableBodyId, stats) {
            const tbody = document.getElementById(tableBodyId);
            tbody.innerHTML = '';
            for (const item of stats) {
                const tr = document.createElement('tr');
                const colorTd = document.createElement('td');
                const preview = document.createElement('span');
                preview.className = 'color-preview';
                preview.style.backgroundColor = item.hex;
                colorTd.appendChild(preview);

                const hexTd = document.createElement('td');
                hexTd.className = 'color-hex';
                hexTd.textContent = item.hex;

                const countTd = document.createElement('td');
                countTd.className = 'color-count';
                countTd.textContent = item.count;

                tr.appendChild(colorTd);
                tr.appendChild(hexTd);
                tr.appendChild(countTd);
                tbody.appendChild(tr);
            }
        }

        // ======================== 模块F: UI控制器 ========================
        const fileInput = document.getElementById('fileInput');
        const gridSizeSelect = document.getElementById('gridSizeSelect');
        const colorCountSlider = document.getElementById('colorCountSlider');
        const colorCountDisplay = document.getElementById('colorCountDisplay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorToast = document.getElementById('errorToast');
        const errorMessage = document.getElementById('errorMessage');

        let currentImageData = null;
        let currentQuantizedData = null;

        function showLoading() {
            loadingOverlay.classList.add('active');
        }

        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorToast.classList.add('active');
            setTimeout(() => {
                errorToast.classList.remove('active');
            }, 5000);
        }

        async function processImage(imageData, gridSize, colorCount) {
            showLoading();
            try {
                const quantizedData = await quantizeColors(imageData, colorCount);
                currentQuantizedData = quantizedData;
                const gridData = mapToGrid(quantizedData, gridSize);
                renderGrid('canvas-main', gridData, quantizedData.palette);
                const stats = generateStatistics(gridData, quantizedData.palette);
                renderStatisticsTable('statsTableBody', stats);
                hideLoading();
            } catch (err) {
                hideLoading();
                showError(err.message || '处理图片时出错');
            }
        }

        async function onImageUpload(file) {
            try {
                const gridSize = parseInt(gridSizeSelect.value);
                const colorCount = parseInt(colorCountSlider.value);
                showLoading();
                const imageData = await loadAndResizeImage(file, gridSize, gridSize);
                currentImageData = imageData;
                await processImage(imageData, gridSize, colorCount);
            } catch (err) {
                hideLoading();
                showError(err.message || '上传或处理图片时出错');
            }
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                onImageUpload(e.target.files[0]);
            }
        });

        gridSizeSelect.addEventListener('change', () => {
            if (currentImageData) {
                const gridSize = parseInt(gridSizeSelect.value);
                const colorCount = parseInt(colorCountSlider.value);
                processImage(currentImageData, gridSize, colorCount);
            }
        });

        colorCountSlider.addEventListener('input', () => {
            colorCountDisplay.textContent = colorCountSlider.value;
        });

        colorCountSlider.addEventListener('change', () => {
            if (currentImageData) {
                const gridSize = parseInt(gridSizeSelect.value);
                const colorCount = parseInt(colorCountSlider.value);
                processImage(currentImageData, gridSize, colorCount);
            }
        });

        // 初始化
        enableZoom('canvas-main');

        // 加载示例图片
        function loadDemoImage() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 64, 64);
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(0.5, '#feca57');
            gradient.addColorStop(1, '#48dbfb');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            ctx.fillStyle = '#ffffff';
            ctx.font = '30px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧩', 32, 32);

            canvas.toBlob((blob) => {
                const file = new File([blob], 'demo.png', { type: 'image/png' });
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                fileInput.files = dataTransfer.files;
                onImageUpload(file);
            });
        }

        // 自动加载示例
        loadDemoImage();
    })();
</script>
</body>
</html>
