<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年销售数据分析报告</title>
    <!-- 引入 Chart.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        /* ====== 全局样式与变量 (来自前端开发工程师，已整合) ====== */
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --transition: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--gray-800);
            background-color: var(--gray-50);
            padding: 0;
            min-height: 100vh;
        }

        /* ====== 布局容器 ====== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px 0;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gray-900);
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--gray-600);
            max-width: 600px;
            margin: 0 auto;
        }

        /* ====== KPI 卡片区域 ====== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            border-radius: var(--radius-lg) 0 0 var(--radius-lg);
        }

        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .kpi-card .kpi-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 24px;
        }

        .kpi-card .kpi-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .kpi-card .kpi-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--gray-900);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .kpi-card .kpi-change {
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .kpi-card .kpi-change.positive {
            color: var(--success);
        }

        .kpi-card .kpi-change.negative {
            color: var(--danger);
        }

        /* ====== 主要内容网格 ====== */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        /* ====== 区域筛选卡片 ====== */
        .region-filter {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
        }

        .region-filter h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .region-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .region-card {
            padding: 16px;
            border-radius: var(--radius-md);
            border: 2px solid var(--gray-200);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            background: var(--gray-50);
        }

        .region-card:hover {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }

        .region-card.active {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.1);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .region-card .region-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--gray-800);
            margin-bottom: 4px;
        }

        .region-card .region-category {
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        .region-card .region-revenue {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
            margin-top: 8px;
        }

        /* ====== 图表容器 ====== */
        .chart-container {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
        }

        .chart-container h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
            width: 100%;
        }

        /* ====== 数据表格区域 ====== */
        .table-container {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }

        .table-container h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: 1rem;
            background: white;
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-200);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .data-table thead {
            background: var(--gray-100);
        }

        .data-table th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--gray-700);
            border-bottom: 2px solid var(--gray-200);
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }

        .data-table th:hover {
            background: var(--gray-200);
            color: var(--gray-900);
        }

        .data-table th .sort-icon {
            margin-left: 4px;
            opacity: 0.5;
            transition: var(--transition);
        }

        .data-table th.sorted .sort-icon {
            opacity: 1;
            color: var(--primary);
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--gray-100);
            color: var(--gray-700);
        }

        .data-table tbody tr {
            transition: var(--transition);
        }

        .data-table tbody tr:hover {
            background: rgba(37, 99, 235, 0.05);
        }

        .data-table tbody tr:nth-child(even) {
            background: var(--gray-50);
        }

        .data-table .region-cell {
            font-weight: 600;
            color: var(--gray-900);
        }

        .data-table .number-cell {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Menlo, 'Courier New', monospace;
            text-align: right;
        }

        .data-table .positive-value {
            color: var(--success);
            font-weight: 600;
        }

        .data-table .negative-value {
            color: var(--danger);
            font-weight: 600;
        }

        .data-table .currency::before {
            content: '¥';
            margin-right: 2px;
        }

        .data-table .percentage::after {
            content: '%';
            margin-left: 2px;
        }

        /* ====== 摘要区域 ====== */
        .summary-section {
            background: white;
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            margin-top: 32px;
        }

        .summary-section h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .summary-card {
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-200);
            background: var(--gray-50);
        }

        .summary-card h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-card ul {
            list-style: none;
            padding-left: 0;
        }

        .summary-card li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
            color: var(--gray-600);
        }

        .summary-card li::before {
            content: '•';
            color: var(--primary);
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        /* ====== 响应式设计 ====== */
        @media (max-width: 1024px) {
            .kpi-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            
            .kpi-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .region-cards {
                grid-template-columns: 1fr;
            }
            
            .summary-grid {
                grid-template-columns: 1fr;
            }
            
            .kpi-card .kpi-value {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.75rem;
            }
        }

        /* ====== 加载动画 ====== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--gray-200);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.1rem;
            color: var(--gray-600);
            font-weight: 600;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

    <div class="loading-overlay" id="loadingOverlay">

                        <thead>

                                <th onclick="sortTable(7)">类别 <span class="sort-icon">↕</span></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 将由JS动态填充 -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <!-- 文字摘要区域 -->

            <div class="summary-grid" id="summaryGrid">
                <!-- 将由JS动态填充 -->

        let rawData = [];
        let processedData = {
            total: {},

        // ====== 2. 数据处理模块 (数据工程师逻辑) ======
        function parseCSV(csvString) {
            const lines = csvString.trim().split('\n');
            const headers = lines[0].split(',');
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                if (values.length === headers.length) {
                    data.push({
                        region: values[0],
                        month: values[1],
                        revenue: parseFloat(values[2]),
                        cost: parseFloat(values[3]),
                        units_sold: parseInt(values[4]),
                        category: values[5],
                        profit: parseFloat(values[2]) - parseFloat(values[3]),
                        profit_margin: ((parseFloat(values[2]) - parseFloat(values[3])) / parseFloat(values[2]) * 100)
                    });
                }
            }
            return data;
        }

        function computeAggregates(data) {
            const result = {
                total: { revenue: 0, cost: 0, profit: 0, units: 0 },
                byRegion: {},
                byMonth: {},
                byCategory: {},
                byQuarter: {}
            };

            // 初始化区域结构
            const regions = [...new Set(data.map(d => d.region))];
            regions.forEach(r => {
                result.byRegion[r] = { 
                    revenue: 0, cost: 0, profit: 0, units: 0, 
                    monthly: [], category: data.find(d => d.region === r).category 
                };
            });

            // 初始化分类结构
            const categories = [...new Set(data.map(d => d.category))];
            categories.forEach(c => {
                result.byCategory[c] = { revenue: 0, cost: 0, profit: 0, units: 0 };
            });

            // 初始化月份结构
            const months = [...new Set(data.map(d => d.month))].sort();
            months.forEach(m => {
                result.byMonth[m] = { 
                    revenue: 0, cost: 0, profit: 0, units: 0, 
                    regions: {} 
                };
                regions.forEach(r => {
                    result.byMonth[m].regions[r] = { revenue:
