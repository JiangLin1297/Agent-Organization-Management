<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>2025 区域销售 · 分析报告</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f8fc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 2rem 1.5rem;
            color: #1a2634;
            line-height: 1.5;
        }

        .report {
            max-width: 1440px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: -0.02em;
            color: #0b1a2a;
        }

        .header h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #5b6f82;
            margin-left: 0.75rem;
        }

        .badge {
            background: #e2eaf1;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #1f3a4b;
            font-weight: 500;
        }

        /* KPI 卡片 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .kpi-card {
            background: white;
            padding: 1.5rem 1.2rem;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 20, 30, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .kpi-label {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #5b6f82;
            margin-bottom: 0.3rem;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 600;
            color: #0b1a2a;
            line-height: 1.2;
        }

        .kpi-sub {
            font-size: 0.85rem;
            color: #3f5568;
            margin-top: 0.2rem;
            border-top: 1px solid #eef3f8;
            padding-top: 0.4rem;
        }

        /* 图表网格 */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
            margin-bottom: 2.5rem;
        }

        .chart-card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem 1.2rem 1rem 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 20, 30, 0.04);
            border: 1px solid #ffffff;
        }

        .chart-card h3 {
            font-weight: 500;
            font-size: 1.1rem;
            color: #1f3a4b;
            margin-bottom: 0.8rem;
            padding-left: 0.2rem;
        }

        .chart-card canvas {
            width: 100% !important;
            height: auto !important;
            max-height: 260px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .chart-card.pie-card canvas {
            max-height: 220px;
        }

        /* 表格 */
        .table-wrapper {
            background: white;
            border-radius: 28px;
            padding: 1.5rem 1.2rem 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 20, 30, 0.04);
            margin-bottom: 2.5rem;
            overflow-x: auto;
        }

        .table-wrapper h3 {
            font-weight: 500;
            font-size: 1.1rem;
            color: #1f3a4b;
            margin-bottom: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            text-align: left;
            padding: 0.8rem 0.5rem 0.6rem 0.5rem;
            font-weight: 500;
            color: #3f5568;
            border-bottom: 1px solid #e2eaf1;
        }

        td {
            padding: 0.7rem 0.5rem;
            border-bottom: 1px solid #f0f5fa;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .region-name {
            font-weight: 500;
            color: #0b1a2a;
        }

        .num {
            font-feature-settings: "tnum";
            text-align: right;
        }

        /* 文字摘要 */
        .summary-section {
            background: white;
            border-radius: 28px;
            padding: 1.8rem 2rem;
            box-shadow: 0 8px 24px rgba(0, 20, 30, 0.04);
            margin-bottom: 1.5rem;
        }

        .summary-section h3 {
            font-weight: 500;
            font-size: 1.2rem;
            color: #1f3a4b;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .summary-item {
            background: #f6f9fc;
            padding: 1rem 1.2rem;
            border-radius: 20px;
        }

        .summary-item strong {
            display: block;
            font-weight: 600;
            color: #0b1a2a;
            margin-bottom: 0.3rem;
        }

        .summary-item p {
            color: #2a4053;
            font-size: 0.95rem;
            margin: 0;
        }

        .footer-note {
            text-align: center;
            color: #7b8fa0;
            font-size: 0.8rem;
            padding: 1rem 0 0.2rem;
            border-top: 1px solid #e2eaf1;
            margin-top: 1rem;
        }

        @media (max-width: 800px) {
            .chart-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .kpi-value {
                font-size: 1.6rem;
            }
            body {
                padding: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
<div class="report" id="app">
    <!-- 头部 -->
    <div class="header">
        <h1>
            📊 2025 区域销售分析
            <small>5 区域 · 12 月</small>
        </h1>
        <span class="badge">数据动态渲染 · Chart.js</span>
    </div>

    <!-- KPI 卡片 -->
    <div class="kpi-grid" id="kpiContainer">
        <div class="kpi-card"><div class="kpi-label">总收入</div><div class="kpi-value" id="kpiRevenue">—</div><div class="kpi-sub">全年汇总</div></div>
        <div class="kpi-card"><div class="kpi-label">总成本</div><div class="kpi-value" id="kpiCost">—</div><div class="kpi-sub">全年汇总</div></div>
        <div class="kpi-card"><div class="kpi-label">总利润</div><div class="kpi-value" id="kpiProfit">—</div><div class="kpi-sub">全年汇总</div></div>
        <div class="kpi-card"><div class="kpi-label">总销量</div><div class="kpi-value" id="kpiUnits">—</div><div class="kpi-sub">单位</div></div>
    </div>

    <!-- 图表区域 第一行：趋势图 + 对比图 -->
    <div class="chart-grid">
        <div class="chart-card">
            <h3>📈 月度收入趋势</h3>
            <canvas id="trendChart" width="400" height="220"></canvas>
        </div>
        <div class="chart-card">
            <h3>💰 收入 vs 成本</h3>
            <canvas id="comparisonChart" width="400" height="220"></canvas>
        </div>
    </div>

    <!-- 图表区域 第二行：利润分布图 (饼图) 全宽 -->
    <div class="chart-grid">
        <div class="chart-card pie-card full-width">
            <h3>🧩 利润分布 (按区域)</h3>
            <canvas id="profitChart" width="500" height="220"></canvas>
        </div>
    </div>

    <!-- 数据表格 -->
    <div class="table-wrapper">
        <h3>📋 区域年度汇总</h3>
        <table id="summaryTable">
            <thead>
                <tr><th>区域</th><th class="num">总收入</th><th class="num">总成本</th><th class="num">总利润</th><th class="num">总销量</th></tr>
            </thead>
            <tbody id="tableBody">
                <!-- 动态渲染 -->
            </tbody>
        </table>
    </div>

    <!-- 文字摘要 -->
    <div class="summary-section" id="summarySection">
        <h3>📌 分析摘要</h3>
        <div class="summary-grid" id="summaryGrid">
            <div class="summary-item"><strong>核心 KPI</strong><p id="sumKPI">加载中...</p></div>
            <div class="summary-item"><strong>最佳 / 最差区域</strong><p id="sumBestWorst">加载中...</p></div>
            <div class="summary-item"><strong>季节性趋势</strong><p id="sumSeasonal">加载中...</p></div>
            <div class="summary-item"><strong>增长率 (Q1 vs Q4)</strong><p id="sumGrowth">加载中...</p></div>
        </div>
    </div>
    <div class="footer-note">数据看板 · 基于 CSV 动态渲染 · 2025</div>
</div>

<script>
    (function() {
        // ---------- 原始 CSV 数据 (硬编码) ----------
        const CSV_DATA = `region,month,revenue,cost,units_sold,category
North,2025-01,125000,82000,450,Electronics
North,2025-02,132000,85000,480,Electronics
North,2025-03,118000,79000,420,Electronics

North,2025-11,175000,105000,625,Electronics

South,2025-08,110000,71000,425,Electronics
South,2025-09,121000,76000,465,Electronics
South,2025-10,130000,81000,500,Electronics
South,2025-11,140000,86000,535,Electronics
South,2025-12,158000,95000,605,Electronics
East,2025-01,85000,58000,320,Home
East,2025-02,89000,60000,335,Home
East,2025-03,82000,56000,310,Home
East,2025-04,95000,63000,360,Home
East,2025-05,102000,67000,385,Home
East,2025-06,110000,71000,415,Home
East,2025-07,98000,65000,370,Home
East,2025-08,94000,63000,355,Home
East,2025-09,101000,66000,380,Home
East,2025-10,108000,70000,408,Home
East,2025-11,116000,74000,438,Home
East,2025-12,132000,83000,498,Home
West,2025-01,72000,50000,280,Home
West,2025-02,76000,52000,295,Home
West,2025-03,68000,48000,265,Home
West,2025-04,82000,55000,320,Home
West,2025-05,88000,58000,342,Home
West,2025-06,95000,62000,370,Home
West,2025-07,85000,57000,330,Home
West,2025-08,81000,55000,315,Home
West,2025-09,87000,57500,338,Home
West,2025-10,93000,60500,362,Home
West,2025-11,100000,64000,390,Home
West,2025-12,115000,72000,448,Home
Central,2025-01,65000,45000,250,Fashion
Central,2025-02,68000,47000,262,Fashion
Central,2025-03,62000,43000,240,Fashion
Central,2025-04,74000,49000,288,Fashion
Central,2025-05,79000,52000,308,Fashion
Central,2025-06,86000,56000,335,Fashion
Central,2025-07,76000,50000,295,Fashion
Central,2025-08,73000,49000,282,Fashion
Central,2025-09,78000,51500,302,Fashion
Central,2025-10,84000,54500,326,Fashion
Central,2025-11,91000,58000,353,Fashion
Central,2025-12,104000,65000,403,Fashion`;

        // ---------- 模块 A1: CSV 解析 ----------
        function parseCSV(csvString) {
            const lines = csvString.trim().split('\n');
            if (lines.length < 2) throw new Error('CSV 数据不足');
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const vals = lines[i].split(',').map(v => v.trim());
                if (vals.length !== headers.length) continue;
                const entry = {};
                headers.forEach((h, idx) => {
                    let val = vals[idx];
                    if (h === 'revenue' || h === 'cost' || h === 'units_sold') {
                        val = parseFloat(val) || 0;
                    } else {
                        val = isNaN(Number(val)) ? val : (parseFloat(val) || 0);
                    }
                    entry[h] = val;
                });
                entry.profit = (entry.revenue || 0) - (entry.cost || 0);
                data.push(entry);
            }
            return data;
        }

        // ---------- 模块 A2: 数据聚合 ----------
        function aggregateByRegion(data) {
            const regionMap = {};
            const regions = [...new Set(data.map(d => d.region))];
            const monthSet = [...new Set(data.map(d => d.month))].sort();
            regions.forEach(r => {
                regionMap[r] = {
                    totalRevenue: 0,
                    totalCost: 0,
                    totalProfit: 0,
                    totalUnits: 0,
                    monthlyData: []
                };
                const regionData = data.filter(d => d.region === r);
                monthSet.forEach(m => {
                    const monthEntries = regionData.filter(d => d.month === m);
                    const revenue = monthEntries.reduce((s, d) => s + (d.revenue || 0), 0);
                    const cost = monthEntries.reduce((s, d) => s + (d.cost || 0), 0);
                    const profit = revenue - cost;
                    const units = monthEntries.reduce((s, d) => s + (d.units_sold || 0), 0);
                    regionMap[r].monthlyData.push({ month: m, revenue, cost, profit, units });
                    regionMap[r].totalRevenue += revenue;
                    regionMap[r].totalCost += cost;
                    regionMap[r].totalProfit += profit;
                    regionMap[r].totalUnits += units;
                });
            });
            return { aggregated: regionMap, months: monthSet, regions };
        }

        // ---------- 模块 B: KPI 和排名 ----------
        function calculateGlobalKPI(aggregatedData) {
            const regions = Object.keys(aggregatedData);
            let totalRevenue = 0, totalCost = 0, totalProfit = 0, totalUnits = 0;
            regions.forEach(r => {
                totalRevenue += aggregatedData[r].totalRevenue;
                totalCost += aggregatedData[r].totalCost;
                totalProfit += aggregatedData[r].totalProfit;
                totalUnits += aggregatedData[r].totalUnits;
            });
            return { totalRevenue, totalCost, totalProfit, totalUnits };
        }

        function calculateRegionRanking(aggregatedData) {
            const regions = Object.keys(aggregatedData);
            const ranking = regions.map(r => ({
                region: r,
                revenue: aggregatedData[r].totalRevenue,
                profit: aggregatedData[r].totalProfit
            })).sort((a, b) => b.revenue - a.revenue);
            return { bestRegion: ranking[0], worstRegion: ranking[ranking.length - 1], ranking };
        }

        // ---------- 工具: 格式化 ----------
        function formatCurrency(v) {
            return '¥' + v.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }
        function formatUnits(v) {
            return v.toLocaleString('zh-CN');
        }

        // ---------- 主渲染函数 ----------
        function renderDashboard() {
            let rawData;
            try {
                rawData = parseCSV(CSV_DATA);
            } catch (e) {
                document.getElementById('kpiContainer').innerHTML = `<div style="color:#b02b2b;background:#ffe9e9;padding:1rem 1.5rem;border-radius:40px;">⚠️ CSV 解析错误: ${e.message}</div>`;
                return;
            }
            const { aggregated, months, regions } = aggregateByRegion(rawData);
            const globalKPI = calculateGlobalKPI(aggregated);
            const ranking = calculateRegionRanking(aggregated);

            // 1. KPI 卡片
            document.getElementById('kpiRevenue').innerText = formatCurrency(globalKPI.totalRevenue);
            document.getElementById('kpiCost').innerText = formatCurrency(globalKPI.totalCost);
            document.getElementById('kpiProfit').innerText = formatCurrency(globalKPI.totalProfit);
            document.getElementById('kpiUnits').innerText = formatUnits(globalKPI.totalUnits);

            // 2. 表格
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            regions.forEach(r => {
                const d = aggregated[r];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="region-name">${r}</td>
                    <td class="num">${formatCurrency(d.totalRevenue)}</td>
                    <td class="num">${formatCurrency(d.totalCost)}</td>
                    <td class="num">${formatCurrency(d.totalProfit)}</td>
                    <td class="num">${formatUnits(d.totalUnits)}</td>
                `;
                tbody.appendChild(tr);
            });

            // 3. 图表渲染 (Chart.js)
            // 3.1 月度趋势图 (折线图)
            const ctxTrend = document.getElementById('trendChart').getContext('2d');
            const monthLabels = months.map(m => m.replace('2025-', ''));
            const colors = ['#3b82f6', '#f97316', '#10b981', '#ef4444', '#8b5cf6'];
            const trendDatasets = regions.map((r, idx) => ({
                label: r,
                data: aggregated[r].monthlyData.map(d => d.revenue),
                borderColor: colors[idx % colors.length],
                backgroundColor: colors[idx % colors.length] + '22',
                borderWidth: 2.5,
                tension: 0.2,
                pointRadius: 3,
                pointHoverRadius: 6,
                fill: false
            }));
            new Chart(ctxTrend, {
                type: 'line',
                data: { labels: monthLabels, datasets: trendDatasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { position: 'top', labels: { boxWidth: 12, padding: 12 } } },
                    scales: { y: { beginAtZero: true, ticks: { callback: v => '¥' + (v/1000).toFixed(0) + 'k' } } }
                }
            });

            // 3.2 收入vs成本对比图 (分组柱状图)
            const ctxComp = document.getElementById('comparisonChart').getContext('2d');
            new Chart(ctxComp, {
                type: 'bar',
                data: {
                    labels: regions,
                    datasets: [
                        { label: '总收入', data: regions.map(r => aggregated[r].totalRevenue), backgroundColor: '#3b82f6', borderRadius: 6 },
                        { label: '总成本', data: regions.map(r => aggregated[r].totalCost), backgroundColor: '#f97316', borderRadius: 6 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { position: 'top', labels: { boxWidth: 12 } } },
                    scales: { y: { beginAtZero: true, ticks: { callback: v => '¥' + (v/1000).toFixed(0) + 'k' } } }
                }
            });

            // 3.3 利润分布图 (饼图)
            const ctxPie = document.getElementById('profitChart').getContext('2d');
            const profitData = regions.map(r => aggregated[r].totalProfit);
            new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: regions,
                    datasets: [{
                        data: profitData,
                        backgroundColor: ['#3b82f6', '#f97316', '#10b981', '#ef4444', '#8b5cf6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'right', labels: { boxWidth: 12, padding: 10 } },
                        tooltip: { callbacks: { label: ctx => {
                            const total = profitData.reduce((a,b)=>a+b,0);
                            const pct = ((ctx.parsed / total) * 100).toFixed(1);
                            return ctx.label + ': ' + formatCurrency(ctx.parsed) + ' (' + pct + '%)';
                        }}}
                    }
                }
            });

            // 4. 文字摘要
            // 4.1 核心KPI
            document.getElementById('sumKPI').innerText = `总收入 ${formatCurrency(globalKPI.totalRevenue)}，总成本 ${formatCurrency(globalKPI.totalCost)}，总利润 ${formatCurrency(globalKPI.totalProfit)}，总销量 ${formatUnits(globalKPI.totalUnits)}。`;

            // 4.2 最佳/最差区域 (按收入)
            const best = ranking.bestRegion;
            const worst = ranking.worstRegion;
            document.getElementById('sumBestWorst').innerText = `最佳区域：${best.region}（收入 ${formatCurrency(best.revenue)}，利润 ${formatCurrency(best.profit)}）；最差区域：${worst.region}（收入 ${formatCurrency(worst.revenue)}，利润 ${formatCurrency(worst.profit)}）。`;

            // 4.3 季节性趋势：分析每月总收入，找出最高和最低月份
            const monthlyTotals = months.map(m => {
                let sum = 0;
                regions.forEach(r => {
                    const md = aggregated[r].monthlyData.find(d => d.month === m);
                    if (md) sum += md.revenue;
                });
                return { month: m, total: sum };
            });
            const maxMonth = monthlyTotals.reduce((a,b) => a.total > b.total ? a : b);
            const minMonth = monthlyTotals.reduce((a,b) => a.total < b.total ? a : b);
            document.getElementById('sumSeasonal').innerText = `销售旺季在 ${maxMonth.month.replace('2025-', '')} 月（收入 ${formatCurrency(maxMonth.total)}），淡季在 ${minMonth.month.replace('2025-', '')} 月（收入 ${formatCurrency(minMonth.total)}）。整体呈年底攀升趋势。`;

            // 4.4 增长率 Q1 vs Q4 (Q1: 1-3月, Q4: 10-12月)
            const q1Months = ['2025-01','2025-02','2025-03'];
            const q4Months = ['2025-10','2025-11','2025-12'];
            let q1Revenue = 0, q4Revenue = 0;
            regions.forEach(r => {
                aggregated[r].monthlyData.forEach(d => {
                    if (q1Months.includes(d.month)) q1Revenue += d.revenue;
                    if (q4Months.includes(d.month)) q4Revenue += d.revenue;
                });
            });
            const growth = ((q4Revenue - q1Revenue) / q1Revenue * 100).toFixed(1);
            document.getElementById('sumGrowth').innerText = `Q1 总收入 ${formatCurrency(q1Revenue)}，Q4 总收入 ${formatCurrency(q4Revenue)}，增长 ${growth}%。年底冲刺效应显著。`;
        }

        // 页面加载后执行
        window.addEventListener('DOMContentLoaded', renderDashboard);
    })();
</script>
